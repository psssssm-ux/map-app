<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; font-family: sans-serif; }
        #sidebar { width: 320px; min-width: 320px; height: 100%; background: #ffffff; border-right: 1px solid #eaeaea; padding: 25px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        
        /* 스타일 복구 */
        h3 { font-size: 18px; color: #444; margin-bottom: 20px; border-bottom: 2px solid #764ba2; padding-bottom: 10px; }
        #searchKeyword { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; }
        #resultList { list-style: none; padding: 0; display: none; background: #fff; border: 1px solid #eee; border-radius: 12px; }
        #resultList li { padding: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; }
        
        .custom-overlay { position: absolute; bottom: 60px; left: -130px; border-radius: 16px; background: #ffffff; box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: 260px; pointer-events: none; }
        .overlay-header { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; padding: 12px 18px; font-weight: 700; border-radius: 16px 16px 0 0; }
        .overlay-body { padding: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>사이트 관리</h3>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색..." onkeyup="filterList()">
        <ul id="resultList"></ul>
        <div style="margin-top:20px; font-size:13px;">전체 사이트: <b id="totalCount">0개</b></div>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        });

        async function loadSheetData() {
            const res = await fetch('https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec');
            sheetData = await res.json();
            document.getElementById('totalCount').textContent = sheetData.length + '개';

            sheetData.forEach((item, index) => {
                if (!item.address) return;
                const cached = localStorage.getItem('loc_' + item.address);
                if (cached) {
                    addMarker(JSON.parse(cached), item);
                } else {
                    setTimeout(() => {
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === kakao.maps.services.Status.OK) {
                                const pos = { lat: result[0].y, lng: result[0].x };
                                localStorage.setItem('loc_' + item.address, JSON.stringify(pos));
                                addMarker(pos, item);
                            }
                        });
                    }, index * 100);
                }
            });
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(pos.lat, pos.lng) });
            kakao.maps.event.addListener(marker, 'mouseover', () => showOverlay(marker, item));
            kakao.maps.event.addListener(marker, 'mouseout', () => closeOverlay());
            clusterer.addMarker(marker);
        }

        function showOverlay(target, item) {
            closeOverlay();
            const content = document.createElement('div');
            content.className = 'custom-overlay';
            content.innerHTML = `<div class="overlay-header">${item.site}</div><div class="overlay-body">경비사: ${item.sec || '-'}<br>주차: ${item.park || '-'}</div>`;
            customOverlay = new kakao.maps.CustomOverlay({ position: target.getPosition(), content: content, yAnchor: 1 });
            customOverlay.setMap(map);
        }

        function closeOverlay() { if (customOverlay) customOverlay.setMap(null); }

        function filterList() {
            const val = document.getElementById('searchKeyword').value;
            const list = document.getElementById('resultList');
            const filtered = sheetData.filter(i => i.site.includes(val));
            list.innerHTML = val ? filtered.map(i => `<li onclick="goTo('${i.address}')">${i.site}</li>`).join('') : '';
            list.style.display = val && filtered.length ? 'block' : 'none';
        }

        function goTo(addr) {
            geocoder.addressSearch(addr, (res, status) => {
                if(status === 'OK') map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
            });
        }
    </script>
</body>
</html>
