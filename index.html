<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱 - 프로 디자인</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { 
            width: 320px; min-width: 320px; height: 100vh; background: #ffffff; 
            border-right: 1px solid #eaeaea; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; 
        }
        
        #sidebarContent { flex: 1; padding: 25px; overflow-y: auto; }
        #sidebarFooter { flex-shrink: 0; padding: 20px; border-top: 1px solid #eee; font-size: 11px; color: #999; text-align: center; background: #fafafa; line-height: 1.6; }
        #map { flex-grow: 1; height: 100vh; background-color: #f0f0f0; }
        
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; min-width: 100%; height: 40vh; }
            #map { height: 60vh; }
        }
        
        .btn-common { width: 100%; max-width: 270px; display: block; margin: 0 auto 10px auto; padding: 14px 0; text-align: center; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-common:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* 현재 위치 툴팁 */
        .my-location-tooltip { padding: 6px 12px; background: #ff4757; color: white; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }

        /* [개선] 정보창(CustomOverlay) 디자인 */
        .info-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 280px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-header {
            background: #0070c0;
            padding: 15px 20px;
            color: white;
            position: relative;
        }

        .info-header .site-name {
            font-size: 17px;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
        }

        .info-header .site-addr {
            font-size: 12px;
            opacity: 0.8;
            font-weight: 400;
        }

        .info-body {
            padding: 15px 20px;
            background: #fff;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: #444;
        }

        .info-row i {
            width: 24px;
            color: #0070c0;
            font-size: 14px;
        }

        .info-row .label {
            font-weight: 700;
            color: #888;
            margin-right: 10px;
            min-width: 35px;
        }

        .info-footer {
            display: flex;
            border-top: 1px solid #eee;
            background: #f8f9fa;
        }

        .info-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #555;
            text-decoration: none;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .info-btn:first-child { border-right: 1px solid #eee; }
        .info-btn:hover { background: #e9ecef; color: #0070c0; }

        #recentList, #resultList { list-style: none; padding: 0; margin-top: 10px; display: none; background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; width: 90%; margin: 0 auto; overflow: hidden; }
        #recentList li, #resultList li { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="sidebarContent">
                <div id="loadingWrapper" style="margin-bottom: 20px;">
                    <div style="font-size:13px; font-weight:bold; color:#0070c0;">데이터 동기화 중... <span id="percentText">0%</span></div>
                    <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top: 8px;">
                        <div id="progressBar" style="width: 0%; height: 100%; background: #0070c0; transition: width 0.3s;"></div>
                    </div>
                </div>

                <div class="btn-common" style="background-color: #ff9f43; color: #fff;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
                <div class="btn-common" style="background-color: #667eea; color: #fff;" onclick="resetMap()">지도 위치 초기화 🔄</div>
                <div class="btn-common" style="background-color: #0070c0; color: #fff;" onclick="toggleRecent()">최근 수정된 사이트 ▼</div>
                <ul id="recentList"></ul>
                
                <div style="margin-top: 30px;">
                    <h3 style="font-size: 16px; color: #333; border-bottom: 2px solid #0070c0; padding-bottom: 10px;">스마트 사이트 검색</h3>
                    <input type="text" id="searchKeyword" style="width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; transition: border 0.2s;" placeholder="사이트명/코너명/기번 검색..." onfocus="this.style.borderColor='#0070c0'" onblur="this.style.borderColor='#eee'">
                    <ul id="resultList"></ul>
                    <div style="margin-top:15px; font-size:13px; color:#666;">연동된 사이트: <b id="totalCount" style="color:#000;">0개</b></div>
                </div>
            </div>
            
            <div id="sidebarFooter">
                🛠️ 제작: 경남팀 박상문<br>
                💡 아이디어 제공: 경남팀 김민우
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        let loadedCount = 0;
        let currentLocationMarker = null; 
        let myLocOverlay = null;

        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        }

        kakao.maps.load(initMap);

        // 디자인이 개선된 오버레이 렌더링 함수
        function renderOverlay(pos, item) {
            if (customOverlay) customOverlay.setMap(null);
            
            const content = `
                <div class="info-card">
                    <div class="info-header">
                        <span class="site-name">${item.site}</span>
                        <span class="site-addr">${item.address || '주소 정보 없음'}</span>
                    </div>
                    <div class="info-body">
                        <div class="info-row"><i class="fa-solid fa-shield-halved"></i><span class="label">경비</span><span>${item.sec || '-'}</span></div>
                        <div class="info-row"><i class="fa-solid fa-p"></i><span class="label">주차</span><span>${item.park || '-'}</span></div>
                        <div class="info-row"><i class="fa-solid fa-layer-group"></i><span class="label">코너</span><span>${item.bin2 || '-'}</span></div>
                        <div class="info-row"><i class="fa-solid fa-hashtag"></i><span class="label">기번</span><span>${item.mn || '-'}</span></div>
                        <div class="info-row"><i class="fa-solid fa-comment-dots"></i><span class="label">비고</span><span>${item.etc || '-'}</span></div>
                    </div>
                    <div class="info-footer">
                        <a href="tel:${item.phone}" class="info-btn"><i class="fa-solid fa-phone"></i>전화걸기</a>
                        <a href="https://map.kakao.com/link/to/${item.site},${pos.getLat()},${pos.getLng()}" target="_blank" class="info-btn"><i class="fa-solid fa-location-arrow"></i>길찾기</a>
                    </div>
                </div>
            `;

            customOverlay = new kakao.maps.CustomOverlay({ 
                position: pos, 
                content: content, 
                yAnchor: 1.15 // 마커 위로 적절히 띄움
            });
            customOverlay.setMap(map);
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(pos.lat, pos.lng) });
            
            // 클릭 이벤트로 변경 (모바일 사용성 고려)
            kakao.maps.event.addListener(marker, 'click', () => {
                renderOverlay(marker.getPosition(), {
                    site: item.site, address: item.address, sec: item.sec, park: item.park, 
                    bin2: item.BIN2, mn: item.MN, phone: item.phone, etc: item.etc
                });
                map.panTo(marker.getPosition());
            });

            // 지도 클릭 시 오버레이 닫기
            kakao.maps.event.addListener(map, 'click', () => {
                if(customOverlay) customOverlay.setMap(null);
            });

            clusterer.addMarker(marker);
        }

        // --- 이하 로직 기존과 동일 ---

        function createMyLocationMarker(position) {
            const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png';
            const imageSize = new kakao.maps.Size(64, 69);
            const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);
            const marker = new kakao.maps.Marker({ map: map, position: position, image: markerImage });

            kakao.maps.event.addListener(marker, 'click', () => {
                myLocOverlay = new kakao.maps.CustomOverlay({
                    content: '<div class="my-location-tooltip">현재 위치입니다.</div>',
                    position: marker.getPosition(),
                    yAnchor: 2.2
                });
                myLocOverlay.setMap(map);
                setTimeout(() => { if(myLocOverlay) myLocOverlay.setMap(null); }, 2000);
            });
            return marker;
        }

        function moveToMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    if (currentLocationMarker) currentLocationMarker.setMap(null);
                    currentLocationMarker = createMyLocationMarker(locPosition);
                    map.setCenter(locPosition);
                    map.setLevel(3);
                }, (err) => { alert("위치 권한을 허용해주세요."); });
            } else { alert("위치 기능을 지원하지 않습니다."); }
        }

        document.getElementById('searchKeyword').addEventListener('keyup', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            if(!val) { list.style.display = 'none'; return; }
            const filtered = sheetData.filter(i => (i.site && i.site.toLowerCase().includes(val)) || (i.BIN2 && String(i.BIN2).toLowerCase().includes(val)) || (i.MN && String(i.MN).toLowerCase().includes(val)));
            list.innerHTML = filtered.map(i => `<li onclick="showInfo('${i.address}', '${i.site}', '${i.sec}', '${i.park}', '${i.BIN2}', '${i.MN}', '${i.etc || ''}', '${i.phone || ''}')"><strong>${i.site}</strong><br><small style="color:#888">코너: ${i.BIN2 || '-'} / 기번: ${i.MN || '-'}</small></li>`).join('');
            list.style.display = filtered.length ? 'block' : 'none';
        });

        function showInfo(addr, site, sec, park, bin2, mn, etc, phone) {
            geocoder.addressSearch(addr, (res, status) => {
                if(status === 'OK') {
                    const pos = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(pos); map.setLevel(3);
                    renderOverlay(pos, {site, address: addr, sec, park, bin2, mn, etc, phone});
                }
            });
        }

        async function loadSheetData() {
            const res = await fetch('https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec');
            sheetData = await res.json();
            document.getElementById('totalCount').textContent = sheetData.length + '개';
            sheetData.forEach((item, index) => {
                if (!item.address) { loadedCount++; return; }
                const cacheKey = 'loc_' + item.address;
                const cached = localStorage.getItem(cacheKey);
                if (cached) { addMarker(JSON.parse(cached), item); loadedCount++; updateProgress(); }
                else { setTimeout(() => {
                    geocoder.addressSearch(item.address, (result, status) => {
                        if (status === kakao.maps.services.Status.OK) {
                            const pos = { lat: result[0].y, lng: result[0].x };
                            localStorage.setItem(cacheKey, JSON.stringify(pos));
                            addMarker(pos, item);
                        }
                        loadedCount++; updateProgress();
                    });
                }, index * 100); }
            });
        }

        function updateProgress() {
            const percent = Math.round((loadedCount / sheetData.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').textContent = percent + '%';
        }

        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); if(customOverlay) customOverlay.setMap(null); }
        function toggleRecent() {
            const list = document.getElementById('recentList');
            if (list.style.display === 'block') list.style.display = 'none';
            else {
                const sorted = [...sheetData].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 6);
                list.innerHTML = sorted.map(i => `<li onclick="showInfo('${i.address}', '${i.site}', '${i.sec}', '${i.park}', '${i.BIN2}', '${i.MN}', '${i.etc || ''}', '${i.phone || ''}')">${i.site}</li>`).join('');
                list.style.display = 'block';
            }
        }
    </script>
</body>
</html>
