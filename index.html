<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; overflow: hidden; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: 400px; min-width: 400px; height: 100vh; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex: 1; height: 100vh; position: relative; }

        /* 고급스러운 버튼 스타일 */
        .btn-common { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; color: #fff; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-common:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); filter: brightness(1.05); }

        /* 마커 정보창: 고급 카드 디자인 */
        .premium-card { background: white; border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.2); width: 280px; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .premium-header { background: linear-gradient(135deg, #005088 0%, #0070c0 100%); padding: 15px 20px; color: white; font-size: 16px; font-weight: 800; }
        .premium-body { padding: 15px 20px; font-size: 13px; line-height: 1.6; color: #444; }
        .premium-footer { display: flex; border-top: 1px solid #f1f5f9; background: #fafbfc; }
        .footer-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 700; color: #0070c0; cursor: pointer; text-decoration: none; }

        .data-list { list-style: none; padding: 0; margin: 10px 0; display: none; background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
        .data-list li { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div style="font-size:12px; font-weight:bold; color:#0070c0; margin-bottom:10px;">데이터 동기화: 100%</div>
            <div class="btn-common" style="background-color: #ff9f43;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
            <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
            <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList" class="data-list"></ul>
            <div style="font-weight:700; margin-top:20px; color:#333;">사이트 검색 ▼</div>
            <input type="text" id="searchKeyword" style="width:100%; padding:12px; margin-top:10px; box-sizing:border-box; border:1px solid #ddd; border-radius:8px;" placeholder="사이트명/코너명/기번 검색...">
            <ul id="resultList" class="data-list"></ul>
        </div>
        <div id="map"></div>
    </div>
    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadData();
        });
        async function loadData() {
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://script.google.com/macros/s/AKfycbzdpzbv7uXGZ4SqCh5YtSn_0Nfv6aY6iYHHZE1KJi8spiI7Ts_-u0-ZS3pN01RSQBYRQA/exec'));
            sheetData = await res.json();
            sheetData.forEach(item => {
                geocoder.addressSearch(item.address, (result, status) => {
                    if (status === 'OK') {
                        const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                        kakao.maps.event.addListener(marker, 'click', () => showOverlay(result[0], item));
                        clusterer.addMarker(marker);
                    }
                });
            });
        }
        function showOverlay(pos, item) {
            if(customOverlay) customOverlay.setMap(null);
            const content = `
            <div class="premium-card">
                <div class="premium-header">${item.site}</div>
                <div class="premium-body">
                    주소: ${item.address || '-'}<br>
                    기번: ${item.MN || '-'}<br>
                    담당자: ${item.manager || '-'}<br>
                    경비사: ${item.sec || '-'}<br>
                    연락처: ${item.phone || '-'}<br>
                    기타: ${item.etc || '-'}<br>
                    주차: ${item.park || '-'}
                </div>
                <div class="premium-footer">
                    <a href="tel:${item.phone || ''}" class="footer-btn">전화</a>
                    <a href="https://map.kakao.com/link/to/${item.site},${pos.y},${pos.x}" target="_blank" class="footer-btn" style="border-left:1px solid #f1f5f9;">길찾기</a>
                </div>
            </div>`;
            customOverlay = new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(pos.y, pos.x), content: content, yAnchor: 1.15 });
            customOverlay.setMap(map);
        }
        document.getElementById('searchKeyword').addEventListener('keyup', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            const filtered = sheetData.filter(i => (i.site||'').toLowerCase().includes(val) || (i.MN||'').toString().includes(val));
            list.innerHTML = filtered.map(i => `<li onclick="findSite('${i.site}')"><strong>${i.site}</strong></li>`).join('');
            list.style.display = filtered.length > 0 ? 'block' : 'none';
        });
        function findSite(name) {
            const item = sheetData.find(i => i.site === name);
            geocoder.addressSearch(item.address, (res) => {
                map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
                showOverlay(res[0], item);
            });
        }
        function toggleRecent() {
            const list = document.getElementById('recentList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
            if(list.style.display === 'block') {
                list.innerHTML = sheetData.slice(-5).map(i => `<li>${i.site}</li>`).join('');
            }
        }
        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); }
        function moveToMyLocation() { navigator.geolocation.getCurrentPosition(p => map.setCenter(new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude))); }
    </script>
</body>
</html>
