<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=true"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #764ba2; z-index:9999; display:flex; justify-content:center; align-items:center; }
        .loginBox { padding: 40px; background: white; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .loginBox input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .loginBox button { width: 100%; padding: 12px; background: #764ba2; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        
        #sidebar { width: 320px; height: 100%; background: #fff; border-right: 1px solid #ddd; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        #searchKeyword { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #resultList { list-style: none; padding: 0; margin-top: 10px; }
        #resultList li { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        
        #map { flex-grow: 1; height: 100%; display: none; }
        
        .custom-overlay { position: relative; bottom: 85px; border-radius: 10px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); padding: 15px; width: 240px; pointer-events: none; }
        .overlay-header { font-weight: bold; color: #764ba2; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="loginBox">
            <h3>관리자 로그인</h3>
            <input type="text" id="inputId" placeholder="ID">
            <input type="password" id="inputPw" placeholder="PASSWORD">
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <div id="sidebar">
        <h3>사이트 관리</h3>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색..." onkeyup="showResults()">
        <ul id="resultList"></ul>
        <div id="totalCount" style="margin-top:20px; color:#666;"></div>
    </div>

    <div id="map"></div>

    <script>
        const USER_LIST = ["22062", "23004", "17105", "17115", "17183", "17189", "17260", "18145", "19049", "20027", "22017", "22025"];
        let map, geocoder, clusterer, customOverlay, sheetData;

        function handleLogin() {
            const inputId = document.getElementById('inputId').value;
            const inputPw = document.getElementById('inputPw').value;
            if (USER_LIST.includes(inputId) && inputId === inputPw) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('sidebar').style.display = 'block';
                document.getElementById('map').style.display = 'block';
                initMap();
            } else { alert("로그인 실패"); }
        }

        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        }

        function loadSheetData() {
            Papa.parse('https://docs.google.com/spreadsheets/d/e/2PACX-1vSvJ-ZEYTaOAb34GeTSO7t-xEmanJNM1rW727QNiFe4pUcscX19q6r0dWtz6dE0sC0u2wDYIO32_yo_/pub?gid=0&single=true&output=csv', {
                download: true, header: true, complete: (results) => {
                    sheetData = results.data;
                    document.getElementById('totalCount').textContent = "전체: " + sheetData.length + "개";
                    sheetData.forEach(item => {
                        if(item.address) {
                            geocoder.addressSearch(item.address, (result, status) => {
                                if (status === kakao.maps.services.Status.OK) {
                                    var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                                    var marker = new kakao.maps.Marker({ position: coords });
                                    kakao.maps.event.addListener(marker, 'mouseover', () => showOverlay(marker, item));
                                    kakao.maps.event.addListener(marker, 'mouseout', () => closeOverlay());
                                    clusterer.addMarker(marker);
                                }
                            });
                        }
                    });
                }
            });
        }

        function showOverlay(marker, item) {
            closeOverlay();
            const content = document.createElement('div');
            content.className = 'custom-overlay';
            content.innerHTML = `<div class="overlay-header">${item.site}</div><div>${item.address}</div>`;
            customOverlay = new kakao.maps.CustomOverlay({ position: marker.getPosition(), content: content, yAnchor: 1.5 });
            customOverlay.setMap(map);
        }

        function closeOverlay() { if (customOverlay) customOverlay.setMap(null); }

        function showResults() {
            const keyword = document.getElementById('searchKeyword').value;
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            if (keyword.length < 1) return;
            sheetData.filter(item => item.site && item.site.includes(keyword)).forEach(item => {
                let li = document.createElement('li');
                li.textContent = item.site;
                li.onclick = () => selectItem(item);
                list.appendChild(li);
            });
        }

        function selectItem(item) {
            geocoder.addressSearch(item.address, (res, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
                    map.setLevel(3);
                }
            });
        }
    </script>
</body>
</html>
