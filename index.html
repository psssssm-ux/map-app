<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; font-family: sans-serif; }
        #sidebar { width: 320px; min-width: 320px; height: 100%; background: #ffffff; border-right: 1px solid #eaeaea; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        #sidebarContent { padding: 25px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; }
        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        
        #resetBtn { width: 100%; margin-bottom: 20px; cursor: pointer; color: #fff; background-color: #667eea; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-align: center; border: none; }
        #resetBtn:hover { background-color: #5a67d8; }
        
        #recentMenu { margin-bottom: 10px; cursor: pointer; color: #ffffff; background-color: #764ba2; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-align: center; }
        #recentList { list-style: none; padding: 0; margin: 0 0 20px 0; display: none; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; }
        #recentList li { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
        #recentList li:hover { background: #e0e0ff; color: #764ba2; font-weight: bold; }

        #loadingWrapper { margin-bottom: 20px; }
        #progressContainer { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #progressBar { width: 0%; height: 100%; background: #764ba2; transition: width 0.2s; }
        
        h3 { font-size: 18px; color: #444; margin-bottom: 20px; border-bottom: 2px solid #764ba2; padding-bottom: 10px; }
        #searchKeyword { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        #resultList { list-style: none; padding: 0; margin-top: 10px; display: none; background: #fff; border: 1px solid #eee; border-radius: 12px; }
        #resultList li { padding: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 13px; }

        /* 푸터 추가 */
        #footer { margin-top: auto; padding-top: 30px; text-align: center; color: #888; font-size: 12px; }
        .creator { font-size: 16px; font-weight: bold; color: #444; margin-bottom: 5px; }
        .idea { font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebarContent">
            <div id="resetBtn" onclick="resetMap()">지도 위치 초기화 🔄</div>

            <div id="loadingWrapper">
                <div style="font-size:13px; font-weight:bold; color:#764ba2;">데이터 로딩 중... <span id="percentText">0%</span></div>
                <div id="progressContainer"><div id="progressBar"></div></div>
            </div>

            <div id="recentMenu" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList"></ul>

            <h3>사이트 관리</h3>
            <input type="text" id="searchKeyword" placeholder="사이트명/코너명/기번 검색..." onkeyup="filterList()">
            <ul id="resultList"></ul>
            <div style="margin-top:20px; font-size:13px;">전체 사이트: <b id="totalCount">0개</b></div>
            
            <div id="footer">
                <div class="creator">제작자: 박상문</div>
                <div class="idea">아이디어 제공: 김민우</div>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        });

        function resetMap() {
            map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305));
            map.setLevel(7);
        }

        async function loadSheetData() {
            const res = await fetch('https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec');
            sheetData = await res.json();
            document.getElementById('totalCount').textContent = sheetData.length + '개';

            let loaded = 0;
            sheetData.forEach((item, index) => {
                if (!item.address) return;
                const cacheKey = 'loc_' + item.address;
                const cached = localStorage.getItem(cacheKey);

                if (cached) {
                    addMarker(JSON.parse(cached), item);
                    updateProgress(++loaded, sheetData.length);
                } else {
                    setTimeout(() => {
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === kakao.maps.services.Status.OK) {
                                const pos = { lat: result[0].y, lng: result[0].x };
                                localStorage.setItem(cacheKey, JSON.stringify(pos));
                                addMarker(pos, item);
                            }
                            updateProgress(++loaded, sheetData.length);
                        });
                    }, index * 100);
                }
            });
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            if (list.style.display === 'block') {
                list.style.display = 'none';
            } else {
                const sorted = [...sheetData]
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 6);
                list.innerHTML = sorted.map(i => `<li onclick="goTo('${i.address}')">${i.site}</li>`).join('');
                list.style.display = 'block';
            }
        }

        function updateProgress(loaded, total) {
            const percent = Math.round((loaded / total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').textContent = percent + '%';
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(pos.lat, pos.lng) });
            kakao.maps.event.addListener(marker, 'mouseover', () => showOverlay(marker, item));
            kakao.maps.event.addListener(marker, 'mouseout', () => closeOverlay());
            clusterer.addMarker(marker);
        }

        function showOverlay(target, item) {
            closeOverlay();
            const content = document.createElement('div');
            content.className = 'custom-overlay';
            content.innerHTML = `<div class="overlay-header">${item.site}</div>
                                 <div class="overlay-body">
                                    경비사: ${item.sec || '-'}<br>주차: ${item.park || '-'}<br>
                                    코너명: ${item.BIN2 || '-'}<br>기번: ${item.MN || '-'}
                                 </div>`;
            customOverlay = new kakao.maps.CustomOverlay({ position: target.getPosition(), content: content, yAnchor: 1 });
            customOverlay.setMap(map);
        }

        function closeOverlay() { if (customOverlay) customOverlay.setMap(null); }

        function filterList() {
            const val = document.getElementById('searchKeyword').value.toLowerCase();
            const list = document.getElementById('resultList');
            if(!val) { list.style.display = 'none'; return; }
            
            const filtered = sheetData.filter(i => 
                (i.site && i.site.toLowerCase().includes(val)) || 
                (i.BIN2 && String(i.BIN2).toLowerCase().includes(val)) || 
                (i.MN && String(i.MN).toLowerCase().includes(val))
            );

            list.innerHTML = filtered.map(i => `<li onclick="goTo('${i.address}')">
                                                <strong>${i.site}</strong><br>
                                                <small style="color:#666">코너명: ${i.BIN2 || '-'} / 기번: ${i.MN || '-'}</small>
                                              </li>`).join('');
            list.style.display = filtered.length ? 'block' : 'none';
        }

        function goTo(addr) {
            geocoder.addressSearch(addr, (res, status) => {
                if(status === 'OK') {
                    map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
                    map.setLevel(3);
                }
            });
        }
    </script>
</body>
</html>
