<html lang="ko">
<head>

    <title>사이트 통합 지도 앱 - 완전판</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        
        /* 사이드바 스타일 */
        #sidebar { width: 320px; min-width: 320px; height: 100vh; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.05); }
        #sidebarContent { flex: 1; padding: 25px; overflow-y: auto; }
        #sidebarFooter { padding: 15px; border-top: 1px solid #eee; font-size: 11px; color: #999; text-align: center; background: #fcfcfc; line-height: 1.6; }
        #map { flex-grow: 1; height: 100vh; position: relative; }

        /* 공통 버튼 */
        .btn-common { width: 100%; max-width: 270px; display: block; margin: 0 auto 12px auto; padding: 14px 0; text-align: center; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-common:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 검색창 */
        #searchKeyword { width: 100%; padding: 15px; border: 2px solid #edf0f5; border-radius: 12px; font-size: 14px; outline: none; transition: all 0.2s; background: #f8fafc; }
        #searchKeyword:focus { border-color: #0070c0; background: #fff; }

        /* 프리미엄 정보창(CustomOverlay) 가변형 디자인 */
        .premium-card {

            min-width: 280px; max-width: 480px; width: auto !important; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); font-family: 'Pretendard', sans-serif;
        }
        .premium-header { background: linear-gradient(135deg, #005088 0%, #0070c0 100%); padding: 20px 25px; color: white; }
        .premium-header .site-title { font-size: 19px; font-weight: 800; display: block; margin-bottom: 6px; letter-spacing: -0.5px; white-space: nowrap; }
        .premium-header .site-sub { font-size: 13px; opacity: 0.9; display: block; word-break: break-all; }
        .premium-body { padding: 20px 25px; background: #fff; }
        .premium-row { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 14px; }

        .premium-row .row-label { font-weight: 700; color: #94a3b8; width: 45px; font-size: 13px; flex-shrink: 0; margin-top: 5px; }
        .premium-row .row-value { color: #1e293b; font-weight: 600; flex: 1; margin-top: 5px; white-space: nowrap; padding-right: 10px; }
        .premium-row.etc-row .row-value { white-space: normal; word-break: break-all; }
        .premium-footer { display: flex; border-top: 1px solid #f1f5f9; background: #fafbfc; }
        .footer-btn { flex: 1; padding: 18px; text-align: center; font-size: 15px; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; cursor: pointer; }
        .btn-call { color: #0070c0; border-right: 1px solid #f1f5f9; }
        .btn-navi { color: #202124; background: #ffeb00; }
        .footer-btn:hover { filter: brightness(0.95); }

        /* 로딩 바 */
        #progressBarWrapper { margin-bottom: 20px; }
        #progressBar { width: 0%; height: 6px; background: #0070c0; border-radius: 3px; transition: width 0.3s; }
