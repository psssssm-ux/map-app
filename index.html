<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #sidebar { width: 320px; height: 100%; background: #ffffff; border-right: 1px solid #eaeaea; padding: 25px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .menu-btn { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; color: #555; margin-bottom: 10px; }
        .menu-btn:hover { background: #764ba2; color: #fff; border-color: #764ba2; }
        #sidebar h3 { font-size: 16px; color: #764ba2; margin-top: 20px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        #searchKeyword { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        #resultList { list-style: none; padding: 0; margin-top: 10px; }
        #resultList li { padding: 12px 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; }
        #resultList li:hover { background-color: #f4f7ff; color: #764ba2; }
        .footer-area { margin-top: 40px; padding-bottom: 20px; text-align: center; color: #aaa; font-size: 11px; }
        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        
        /* 중요: pointer-events: none을 사용하여 마우스 떨림 방지 */
        .custom-overlay { position: absolute; bottom: 40px; left: -130px; border-radius: 16px; background: #ffffff; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: max-content; min-width: 260px; max-width: 450px; border: none; pointer-events: none; }
        .overlay-header { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; padding: 12px 20px; font-weight: 700; font-size: 15px; border-radius: 16px 16px 0 0; }
        .overlay-body { padding: 15px 20px; font-size: 13px; color: #444; border-radius: 0 0 16px 16px; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="menu-area">
            <button class="menu-btn" onclick="location.reload()">지도 초기화</button>
        </div>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색..." onkeyup="showResults()">
        <h3 id="listTitle"></h3>
        <ul id="resultList"></ul>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer, customOverlay;
        let sheetData = [];
        const apiUrl = "https://script.google.com/macros/s/AKfycbwpmd9E34rOwxJBVbJBOBkcTWG92G6DWWCJk0X_AAPuHNKVSrbK_Lmbsg8_SsHPitbr0g/exec";

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            fetchSheetData();
        });

        async function fetchSheetData() {
    try {
        const response = await fetch(apiUrl);
        sheetData = await response.json();
        clusterer.clear(); // 기존 마커 초기화

        sheetData.forEach(item => {
            if (item.address) {
                geocoder.addressSearch(item.address, (result, status) => {
                    if (status === kakao.maps.services.Status.OK) {
                        const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                        const marker = new kakao.maps.Marker({ position: coords });

                        // 1. 마우스 올렸을 때 이벤트
                        kakao.maps.event.addListener(marker, 'mouseover', () => {
                            showOverlay(marker, item);
                        });

                        // 2. 마우스 벗어났을 때 이벤트
                        kakao.maps.event.addListener(marker, 'mouseout', () => {
                            if (customOverlay) {
                                customOverlay.setMap(null);
                                customOverlay = null;
                            }
                        });

                        clusterer.addMarker(marker);
                    }
                });
            }
        });
    } catch(e) { console.error("데이터 로드 실패:", e); }
}

        // 검색 및 선택 시 정보창 표시 로직 통합
        function showOverlay(target, item) {
            if (customOverlay) customOverlay.setMap(null);
            const content = document.createElement('div');
            content.className = 'custom-overlay';
            content.innerHTML = `
                <div class="overlay-header">${item.site || '정보 없음'}</div>
                <div class="overlay-body">
                    <b>코너명:</b> ${item.BIN2 || '-'}<br>
                    <b>경비사:</b> ${item.sec || '-'}<br>
                    <b>전화:</b> ${item.phone || '-'}<br>
                    <b>기타:</b> ${item.etc || '-'}<br>
                    <b>주차:</b> ${item.park || '-'}<br>
                    <b>주소:</b> ${item.address || '-'}
                </div>`;
            
            // target이 마커이면 위치를 직접 가져오고, 검색 결과 좌표면 넘겨받은 좌표 사용
            const position = target.getPosition ? target.getPosition() : target;
            customOverlay = new kakao.maps.CustomOverlay({ position: position, content: content, yAnchor: 1.2 });
            customOverlay.setMap(map);
        }

        function showResults() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            if (keyword.length < 1) return;
            const filtered = sheetData.filter(item => item.site && String(item.site).includes(keyword));
            filtered.forEach(item => {
                let li = document.createElement('li');
                li.textContent = item.site;
                li.onclick = () => selectItem(item);
                list.appendChild(li);
            });
        }

        function selectItem(item) {
            geocoder.addressSearch(item.address, (res, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    var coords = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(coords);
                    map.setLevel(3);
                    showOverlay(coords, item); // 검색 시에도 동일한 showOverlay 호출
                }
            });
        }
    </script>
</body>
</html>
