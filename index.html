<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; }
        #sidebar { width: 320px; height: 100%; background: #fff; border-right: 1px solid #ccc; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; background: #f0f0f0; }
        #loadingMsg { color: blue; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="loadingWrapper">
            <span id="loadingMsg">데이터 불러오는 중...</span>
        </div>
        <h3>사이트 관리</h3>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색...">
        <div style="margin-top:20px;">전체 사이트: <b id="totalCount">0개</b></div>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer;

        // 1. 초기화 실행 확인
        window.onload = function() {
            kakao.maps.load(() => {
                const container = document.getElementById('map');
                map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
                geocoder = new kakao.maps.services.Geocoder();
                clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
                
                // 데이터 로드 호출
                loadSheetData();
            });
        };

        async function loadSheetData() {
            const jsonUrl = 'https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec';
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                document.getElementById('totalCount').textContent = data.length + '개';
                document.getElementById('loadingMsg').textContent = "데이터 로드 완료!";
                
                // 데이터 확인용 로그
                console.log("데이터 개수:", data.length);
            } catch (e) {
                document.getElementById('loadingMsg').textContent = "에러 발생: " + e.message;
            }
        }
    </script>
</body>
</html>
