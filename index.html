<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱 - 프리미엄 디자인</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 기본 설정 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        
        /* 사이드바 */
        #sidebar { width: 320px; min-width: 320px; height: 100vh; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.05); }
        #sidebarContent { flex: 1; padding: 25px; overflow-y: auto; }
        #sidebarFooter { padding: 15px; border-top: 1px solid #eee; font-size: 11px; color: #aaa; text-align: center; background: #fcfcfc; }
        
        /* 지도 */
        #map { flex-grow: 1; height: 100vh; position: relative; }

        /* 버튼 및 검색창 */
        .btn-common { width: 100%; max-width: 270px; display: block; margin: 0 auto 12px auto; padding: 14px 0; text-align: center; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-common:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        #searchKeyword { width: 100%; padding: 15px; border: 2px solid #edf0f5; border-radius: 12px; font-size: 14px; outline: none; transition: all 0.2s; background: #f8fafc; }
        #searchKeyword:focus { border-color: #0070c0; background: #fff; box-shadow: 0 0 10px rgba(0,112,192,0.1); }

        /* [핵심] 개선된 프리미엄 정보창 디자인 */
        .premium-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 300px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            font-family: 'Pretendard', sans-serif;
        }

        .premium-header {
            background: linear-gradient(135deg, #005088 0%, #0070c0 100%);
            padding: 18px 22px;
            color: white;
        }

        .premium-header .site-title {
            font-size: 18px;
            font-weight: 800;
            display: block;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .premium-header .site-sub {
            font-size: 12px;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .premium-body {
            padding: 20px;
            background: #fff;
        }

        .premium-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .premium-row i {
            width: 28px;
            height: 28px;
            background: #f0f4f8;
            color: #0070c0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 12px;
        }

        .premium-row .row-label {
            font-weight: 700;
            color: #94a3b8;
            width: 45px;
            font-size: 13px;
        }

        .premium-row .row-value {
            color: #1e293b;
            font-weight: 600;
            flex: 1;
        }

        .premium-footer {
            display: flex;
            border-top: 1px solid #f1f5f9;
        }

        .footer-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-call { color: #0070c0; border-right: 1px solid #f1f5f9; }
        .btn-navi { color: #64748b; }
        .footer-btn:hover { background: #f8fafc; }
        .footer-btn i { font-size: 14px; }

        /* 로딩 바 */
        #progressBarWrapper { margin-bottom: 20px; }
        #progressBar { width: 0%; height: 6px; background: #0070c0; border-radius: 3px; transition: width 0.3s; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; min-width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid #eee; }
            #map { height: 60vh; }
        }

        /* 현재 위치 마커 전용 툴팁 */
        .loc-tooltip { padding: 8px 15px; background: #ff4757; color: white; border-radius: 25px; font-size: 12px; font-weight: bold; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); border: 2px solid white; }

        #recentList, #resultList { list-style: none; padding: 0; margin-top: 10px; display: none; background: #f8fafc; border-radius: 12px; overflow: hidden; }
        #recentList li, #resultList li { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; transition: background 0.2s; }
        #recentList li:hover, #resultList li:hover { background: #eef2f7; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="sidebarContent">
                <div id="progressBarWrapper">
                    <div style="font-size:12px; font-weight:bold; color:#0070c0; margin-bottom:5px;">데이터 동기화: <span id="percentText">0%</span></div>
                    <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden;">
                        <div id="progressBar"></div>
                    </div>
                </div>

                <div class="btn-common" style="background-color: #ff9f43; color: #fff;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
                <div class="btn-common" style="background-color: #667eea; color: #fff;" onclick="resetMap()">지도 위치 초기화 🔄</div>
                <div class="btn-common" style="background-color: #0070c0; color: #fff;" onclick="toggleRecent()">최근 수정 사이트 ▼</div>
                <ul id="recentList"></ul>
                
                <div style="margin-top: 30px;">
                    <h3 style="font-size: 16px; color: #333; margin-bottom: 12px;">검색</h3>
                    <input type="text" id="searchKeyword" placeholder="사이트명/코너명/기번 검색...">
                    <ul id="resultList"></ul>
                    <div style="margin-top:15px; font-size:12px; color:#94a3b8;">전체 사이트: <b id="totalCount" style="color:#1e293b;">0개</b></div>
                </div>
            </div>
            <div id="sidebarFooter">
                🛠️ 제작: Sangmun Park | 💡 아이디어: Minwoo kim
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        let loadedCount = 0;
        let currentLocationMarker = null; 
        let myLocOverlay = null;

        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        }

        kakao.maps.load(initMap);

        // [핵심] 완전히 새로 바뀐 정보창 렌더링 함수
        function renderOverlay(pos, item) {
            if (customOverlay) customOverlay.setMap(null);
            
            const content = `
                <div class="premium-card">
                    <div class="premium-header">
                        <span class="site-title">${item.site}</span>
                        <span class="site-sub">${item.address || '주소 정보 없음'}</span>
                    </div>
                    <div class="premium-body">
                        <div class="premium-row"><i class="fa-solid fa-shield-halved"></i><span class="row-label">경비</span><span class="row-value">${item.sec || '-'}</span></div>
                        <div class="premium-row"><i class="fa-solid fa-square-p"></i><span class="row-label">주차</span><span class="row-value">${item.park || '-'}</span></div>
                        <div class="premium-row"><i class="fa-solid fa-layer-group"></i><span class="row-label">코너</span><span class="row-value">${item.bin2 || '-'}</span></div>
                        <div class="premium-row"><i class="fa-solid fa-hashtag"></i><span class="row-label">기번</span><span class="row-value">${item.mn || '-'}</span></div>
                        <div class="premium-row"><i class="fa-solid fa-circle-info"></i><span class="row-label">비고</span><span class="row-value">${item.etc || '-'}</span></div>
                    </div>
                    <div class="premium-footer">
                        <a href="tel:${item.phone}" class="footer-btn btn-call"><i class="fa-solid fa-phone"></i> 전화걸기</a>
                        <a href="https://map.kakao.com/link/to/${item.site},${pos.getLat()},${pos.getLng()}" target="_blank" class="footer-btn btn-navi"><i class="fa-solid fa-location-arrow"></i> 길찾기</a>
                    </div>
                </div>
            `;

            customOverlay = new kakao.maps.CustomOverlay({ 
                position: pos, 
                content: content, 
                yAnchor: 1.12 // 마커 위치에 맞게 세밀하게 조정
            });
            customOverlay.setMap(map);
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(pos.lat, pos.lng) });
            
            // 마커 클릭 시 정보창 표시
            kakao.maps.event.addListener(marker, 'click', () => {
                renderOverlay(marker.getPosition(), {
                    site: item.site, address: item.address, sec: item.sec, park: item.park, 
                    bin2: item.BIN2, mn: item.MN, phone: item.phone, etc: item.etc
                });
                map.panTo(marker.getPosition());
            });

            // 지도 클릭 시 정보창 닫기
            kakao.maps.event.addListener(map, 'click', () => {
                if(customOverlay) customOverlay.setMap(null);
            });

            clusterer.addMarker(marker);
        }

        // 현재 위치 마커 생성
        function createMyLocationMarker(position) {
            const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png';
            const imageSize = new kakao.maps.Size(64, 69);
            const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);
            const marker = new kakao.maps.Marker({ map: map, position: position, image: markerImage });

            kakao.maps.event.addListener(marker, 'click', () => {
                myLocOverlay = new kakao.maps.CustomOverlay({
                    content: '<div class="loc-tooltip">현재 위치입니다.</div>',
                    position: marker.getPosition(),
                    yAnchor: 2.3
                });
                myLocOverlay.setMap(map);
                setTimeout(() => { if(myLocOverlay) myLocOverlay.setMap(null); }, 2500);
            });
            return marker;
        }

        function moveToMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    if (currentLocationMarker) currentLocationMarker.setMap(null);
                    currentLocationMarker = createMyLocationMarker(locPosition);
                    map.setCenter(locPosition);
                    map.setLevel(3);
                }, (err) => { alert("위치 권한을 허용해주세요."); });
            } else { alert("GPS 기능을 지원하지 않는 브라우저입니다."); }
        }

        // 검색 기능
        document.getElementById('searchKeyword').addEventListener('keyup', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            if(!val) { list.style.display = 'none'; return; }
            const filtered = sheetData.filter(i => 
                (i.site && i.site.toLowerCase().includes(val)) || 
                (i.BIN2 && String(i.BIN2).toLowerCase().includes(val)) || 
                (i.MN && String(i.MN).toLowerCase().includes(val))
            );
            list.innerHTML = filtered.map(i => `<li onclick="showInfo('${i.address}', '${i.site}', '${i.sec}', '${i.park}', '${i.BIN2}', '${i.MN}', '${i.etc || ''}', '${i.phone || ''}')"><strong>${i.site}</strong><br><small style="color:#94a3b8">코너: ${i.BIN2 || '-'} / 기번: ${i.MN || '-'}</small></li>`).join('');
            list.style.display = filtered.length ? 'block' : 'none';
        });

        function showInfo(addr, site, sec, park, bin2, mn, etc, phone) {
            geocoder.addressSearch(addr, (res, status) => {
                if(status === 'OK') {
                    const pos = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(pos); map.setLevel(3);
                    renderOverlay(pos, {site, address: addr, sec, park, bin2, mn, etc, phone});
                }
            });
        }

        // 데이터 로드
        async function loadSheetData() {
            try {
                const res = await fetch('https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec');
                sheetData = await res.json();
                document.getElementById('totalCount').textContent = sheetData.length + '개';
                
                sheetData.forEach((item, index) => {
                    if (!item.address) { loadedCount++; return; }
                    const cacheKey = 'loc_' + item.address;
                    const cached = localStorage.getItem(cacheKey);
                    
                    if (cached) { 
                        addMarker(JSON.parse(cached), item); 
                        loadedCount++; updateProgress(); 
                    } else { 
                        setTimeout(() => {
                            geocoder.addressSearch(item.address, (result, status) => {
                                if (status === kakao.maps.services.Status.OK) {
                                    const pos = { lat: result[0].y, lng: result[0].x };
                                    localStorage.setItem(cacheKey, JSON.stringify(pos));
                                    addMarker(pos, item);
                                }
                                loadedCount++; updateProgress();
                            });
                        }, index * 100); 
                    }
                });
            } catch (e) {
                console.error("데이터 로드 실패:", e);
            }
        }

        function updateProgress() {
            const percent = Math.round((loadedCount / sheetData.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').textContent = percent + '%';
        }

        function resetMap() { 
            map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); 
            map.setLevel(7); 
            if(customOverlay) customOverlay.setMap(null); 
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            if (list.style.display === 'block') list.style.display = 'none';
            else {
                const sorted = [...sheetData].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 6);
                list.innerHTML = sorted.map(i => `<li onclick="showInfo('${i.address}', '${i.site}', '${i.sec}', '${i.park}', '${i.BIN2}', '${i.MN}', '${i.etc || ''}', '${i.phone || ''}')">${i.site}</li>`).join('');
                list.style.display = 'block';
            }
        }
    </script>
</body>
</html>
