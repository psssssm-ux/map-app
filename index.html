<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: 400px; min-width: 400px; height: 100vh; background: #fff; border-right: 1px solid #ddd; z-index: 10; display: flex; flex-direction: column; overflow-y: auto; }
        #sidebarContent { padding: 20px; }
        #map { flex-grow: 1; height: 100vh; position: relative; }

        /* 디자인 버튼 스타일 유지 */
        .btn-common { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; color: #fff; text-align: center; }
        
        /* 검색 리스트 및 카드 */
        .data-list { list-style: none; padding: 0; margin: 10px 0; display: none; border: 1px solid #ddd; border-radius: 8px; }
        .data-list li { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        
        .premium-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 250px; }
        .premium-header { font-weight: bold; font-size: 16px; margin-bottom: 10px; border-bottom: 2px solid #0070c0; }

        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 40%; min-height: 40%; }
            #map { height: 60%; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="sidebarContent">
                <div id="progressBar">데이터 동기화: 0%</div>
                <div class="btn-common" style="background-color: #ff9f43;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
                <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
                <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
                <ul id="recentList" class="data-list"></ul>
                <h3>사이트 검색 ▼</h3>
                <input type="text" id="searchKeyword" style="width:100%; padding:10px;" placeholder="사이트명/코너명/기번 검색...">
                <ul id="resultList" class="data-list"></ul>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        
        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadData();
        });

        async function loadData() {
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://script.google.com/macros/s/AKfycbzdpzbv7uXGZ4SqCh5YtSn_0Nfv6aY6iYHHZE1KJi8spiI7Ts_-u0-ZS3pN01RSQBYRQA/exec'));
            sheetData = await res.json();
            let count = 0;
            sheetData.forEach(item => {
                geocoder.addressSearch(item.address, (result, status) => {
                    if (status === 'OK') {
                        const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                        kakao.maps.event.addListener(marker, 'click', () => showOverlay(result[0], item));
                        clusterer.addMarker(marker);
                    }
                    count++;
                    document.getElementById('progressBar').textContent = `데이터 동기화: ${Math.round((count/sheetData.length)*100)}%`;
                });
            });
        }

        function showOverlay(pos, item) {
            if(customOverlay) customOverlay.setMap(null);
            
            // 정보창 HTML 구성 (요청하신 필드 반영)
            const content = `
            <div class="premium-card">
                <div class="premium-header">${item.site}</div>
                <div style="font-size: 13px; line-height: 1.6;">
                    주소: ${item.address || '-'}<br>
                    기번: ${item.MN || '-'}<br>
                    담당자: ${item.manager || '-'}<br>
                    경비사: ${item.sec || '-'}<br>
                    연락처: ${item.phone || '-'}<br>
                    기타: ${item.etc || '-'}<br>
                    주차: ${item.park || '-'}
                </div>
                <div style="margin-top:10px; display:flex; justify-content:space-between;">
                    <a href="tel:${item.phone || ''}">전화</a>
                    <a href="https://map.kakao.com/link/to/${item.site},${pos.y},${pos.x}" target="_blank">길찾기</a>
                </div>
            </div>`;
            
            customOverlay = new kakao.maps.CustomOverlay({ 
                position: new kakao.maps.LatLng(pos.y, pos.x), 
                content: content, 
                yAnchor: 1.2 
            });
            customOverlay.setMap(map);
        }

        document.getElementById('searchKeyword').addEventListener('keyup', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            const filtered = sheetData.filter(i => (i.site||'').toLowerCase().includes(val) || (i.BIN2||'').toString().includes(val) || (i.MN||'').toString().includes(val));
            list.innerHTML = filtered.map(i => `<li onclick="findSite('${i.site}')">${i.site}</li>`).join('');
            list.style.display = filtered.length > 0 ? 'block' : 'none';
        });

        function findSite(name) {
            const item = sheetData.find(i => i.site === name);
            geocoder.addressSearch(item.address, (res) => {
                map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
                showOverlay(res[0], item);
            });
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
            if(list.style.display === 'block') {
                list.innerHTML = sheetData.slice(-5).map(i => `<li>${i.site}</li>`).join('');
            }
        }

        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); }
        function moveToMyLocation() { navigator.geolocation.getCurrentPosition(p => map.setCenter(new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude))); }
    </script>
</body>
</html>
