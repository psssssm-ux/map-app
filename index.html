<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱 - 최종 통합본</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        #sidebar { width: 450px; min-width: 450px; height: 100vh; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.05); }
        #sidebarContent { flex: 1; padding: 25px; overflow-y: auto; }
        #sidebarFooter { padding: 15px; border-top: 1px solid #eee; font-size: 11px; color: #999; text-align: center; background: #fcfcfc; line-height: 1.6; }
        #map { flex-grow: 1; height: 100vh; position: relative; }
        .btn-common { width: 100%; display: block; margin: 0 auto 10px auto; padding: 14px 0; text-align: center; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-common:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #searchKeyword { width: 100%; box-sizing: border-box; padding: 15px; border: 2px solid #edf0f5; border-radius: 12px; font-size: 14px; outline: none; transition: all 0.2s; background: #f8fafc; }
        .premium-card { display: inline-block; background: white; border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.3); min-width: 280px; max-width: 480px; width: auto !important; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .premium-header { background: linear-gradient(135deg, #005088 0%, #0070c0 100%); padding: 20px 25px; color: white; }
        .premium-header .site-title { font-size: 19px; font-weight: 800; display: block; margin-bottom: 6px; }
        .premium-body { padding: 20px 25px; }
        .premium-row { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 14px; }
        .premium-row i { width: 28px; height: 28px; background: #f0f4f8; color: #0070c0; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
        .premium-row .row-label { font-weight: 700; color: #94a3b8; width: 45px; }
        .premium-row .row-value { color: #1e293b; font-weight: 600; flex: 1; }
        .premium-footer { display: flex; border-top: 1px solid #f1f5f9; background: #fafbfc; }
        .footer-btn { flex: 1; padding: 18px; text-align: center; font-weight: 700; cursor: pointer; text-decoration: none; }
        .btn-call { color: #0070c0; border-right: 1px solid #f1f5f9; }
        .btn-navi { color: #202124; background: #ffeb00; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; display: none; background: #f8fafc; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        .data-list li { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
        .data-list li:hover { background: #eef2f7; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="sidebarContent">
                <div class="btn-common" style="background-color: #ff9f43; color: #fff;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
                <div class="btn-common" style="background-color: #667eea; color: #fff;" onclick="resetMap()">지도 위치 초기화 🔄</div>
                <div class="btn-common" style="background-color: #0070c0; color: #fff;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
                <ul id="recentList" class="data-list"></ul>
                <div style="margin-top: 30px;">
                    <h3 style="font-size: 18px; color: #444; border-bottom: 2px solid #0070c0; padding-bottom: 10px;">사이트 검색 ▼</h3>
                    <input type="text" id="searchKeyword" placeholder="사이트명/코너명/기번 검색...">
                    <ul id="resultList" class="data-list"></ul>
                    <div style="margin-top:15px; font-size:12px; color:#94a3b8;">전체 사이트: <b id="totalCount" style="color:#1e293b;">0개</b></div>
                </div>
            </div>
            <div id="sidebarFooter">🛠️ 제작: Sangmun Park<br>💡 아이디어 제공: Minwoo kim</div>
        </div>
        <div id="map"></div>
    </div>
    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        let infowindow = new kakao.maps.InfoWindow({ removable: false });

        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        }
        kakao.maps.load(initMap);

        async function loadSheetData() {
            try {
                const targetUrl = 'https://script.google.com/macros/s/AKfycbzdpzbv7uXGZ4SqCh5YtSn_0Nfv6aY6iYHHZE1KJi8spiI7Ts_-u0-ZS3pN01RSQBYRQA/exec'; 
                const res = await fetch(targetUrl);
                sheetData = await res.json();
                document.getElementById('totalCount').textContent = sheetData.length + '개';
                sheetData.forEach(item => {
                    const cached = localStorage.getItem(item.address);
                    if (cached) addMarker(JSON.parse(cached), item);
                    else geocoder.addressSearch(item.address, (res, status) => {
                        if (status === 'OK') {
                            const pos = { lat: res[0].y, lng: res[0].x };
                            localStorage.setItem(item.address, JSON.stringify(pos));
                            addMarker(pos, item);
                        }
                    });
                });
            } catch (e) { console.error(e); }
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ 
                position: new kakao.maps.LatLng(pos.lat, pos.lng) 
            });

            // 1. 상세 정보 카드 (Click)
            kakao.maps.event.addListener(marker, 'click', () => {
                renderOverlay(marker.getPosition(), item);
                map.panTo(marker.getPosition());
                // 클릭하면 마우스 오버로 떴던 툴팁은 닫음
                if (window.hoverInfoWindow) window.hoverInfoWindow.close();
            });

            // 2. 사이트 이름 툴팁 (Mouseover)
            const hoverInfoWindow = new kakao.maps.InfoWindow({ 
                content: `<div style="padding:5px; font-size:12px; white-space:nowrap;">${item.site}</div>`,
                removable: false 
            });

            kakao.maps.event.addListener(marker, 'mouseover', () => {
                hoverInfoWindow.open(map, marker);
            });

            kakao.maps.event.addListener(marker, 'mouseout', () => {
                hoverInfoWindow.close();
            });

            // 3. 지도 배경 클릭 시 상세 카드 닫기
            kakao.maps.event.addListener(map, 'click', () => { 
                if (customOverlay) customOverlay.setMap(null); 
            });

            clusterer.addMarker(marker);
        }

        function renderOverlay(pos, item) {
            if (customOverlay) customOverlay.setMap(null);
            const sitePhone = item.phone || item['연락처'] || item['연락'] || item.tel || '-';
            const content = `<div class="premium-card">
                <div class="premium-header"><span class="site-title">${item.site}</span><span class="site-sub">${item.address}</span></div>
                <div class="premium-body">
                    <div class="premium-row"><i class="fa-solid fa-shield-halved"></i><span class="row-label">경비</span><span class="row-value">${item.sec || '-'}</span></div>
                    <div class="premium-row"><i class="fa-solid fa-phone"></i><span class="row-label">연락</span><span class="row-value">${sitePhone}</span></div>
                </div>
                <div class="premium-footer">
                    <a href="tel:${sitePhone}" class="footer-btn btn-call">전화걸기</a>
                    <a href="https://map.kakao.com/link/to/${item.site},${pos.getLat()},${pos.getLng()}" target="_blank" class="footer-btn btn-navi">길찾기</a>
                </div>
            </div>`;
            customOverlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1.15, clickable: true });
            customOverlay.setMap(map);
        }

        // 기타 보조 함수들은 기존과 동일
        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); if(customOverlay) customOverlay.setMap(null); }
        // (moveToMyLocation, toggleRecent, search 등 생략된 부분은 기존 코드 유지)
    </script>
</body>
</html>
