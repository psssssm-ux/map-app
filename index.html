<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; }
        /* 사이드바 크기 고정 */
        #sidebar { width: 320px; min-width: 320px; height: 100%; background: #fff; border-right: 1px solid #ccc; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; background: #f0f0f0; }
        #loadingMsg { color: #764ba2; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="loadingWrapper">
            <span id="loadingMsg">데이터 로딩 중...</span>
        </div>
        <h3>사이트 관리</h3>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색...">
        <div style="margin-top:20px;">전체 사이트: <b id="totalCount">0개</b></div>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer;

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        });

        async function loadSheetData() {
            const jsonUrl = 'https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec';
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                document.getElementById('totalCount').textContent = data.length + '개';
                
                // 마커 생성 부하 줄이기: 10개씩 묶어서 처리
                let i = 0;
                function processMarkers() {
                    const batchSize = 10;
                    for (let j = 0; j < batchSize && i < data.length; j++, i++) {
                        const item = data[i];
                        if (!item.address) continue;
                        
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === kakao.maps.services.Status.OK) {
                                const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                                clusterer.addMarker(marker);
                            }
                        });
                    }
                    if (i < data.length) {
                        document.getElementById('loadingMsg').textContent = `로드 중... ${Math.round((i/data.length)*100)}%`;
                        setTimeout(processMarkers, 100); // 0.1초 간격으로 배치 처리
                    } else {
                        document.getElementById('loadingMsg').textContent = "모두 로드되었습니다.";
                    }
                }
                processMarkers();
            } catch (e) {
                document.getElementById('loadingMsg').textContent = "오류 발생";
            }
        }
    </script>
</body>
</html>
