<!DOCTYPE html>

<html lang="ko">

<head>

    <link rel="icon" href="data:,">

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>사이트 통합 지도 앱</title>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>

    <style>

        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; background: #f4f7fa; }

        #app-container { display: flex; width: 100vw; height: 100%; flex-direction: row; }

       #sidebar { 

    width: 450px; 

    min-width: 450px; 

    height: 100%; 

    background: #ffffff; 

    border-right: 1px solid #e1e4e8; 

    display: flex; 

    flex-direction: column; 

    box-sizing: border-box; /* 패딩을 너비에 포함 */

    overflow-x: hidden; 

}

       #scroll-area { 

    flex: 1; 

    overflow-y: auto; 

    padding: 20px; 

    width: 100%;           /* 부모 너비 제한 */

    box-sizing: border-box; /* 중요: 패딩이 너비를 넘치지 않게 함 */

}

        #footer-area { 
    padding: 10px; /* 기존 20px에서 축소 */
    font-size: 10px; /* 글자 크기 축소 */
    line-height: 1.2; 
    border-top: 1px solid #eee; 
    background: #fafafa; 
    text-align: center; 
}
        #map { flex: 1; height: 100%; position: relative; z-index: 1; }

        .btn-common { 

    width: 100%;           /* 사이드바 가로폭에 꽉 차게 */

    box-sizing: border-box; /* 패딩이 너비를 밀어내지 않게 함 */

    padding: 12px; 

    margin-bottom: 8px; 

    border-radius: 12px; 

    font-weight: 700; 

    font-size: 14px; 

    cursor: pointer; 

    border: none; 

    color: #fff; 

    text-align: center; 

}#searchKeyword {

    width: 100% !important;

    box-sizing: border-box !important;

    padding: 14px;

    margin-top: 5px;

}

        .data-list { list-style: none; padding: 0; margin: 10px 0; background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; display: none; overflow-y: auto; max-height: 300px; }

        .data-list li { padding: 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px; }

        .info-card { width: 280px; background: #ffffff; border-radius: 20px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #f0f0f0; }

        .card-title { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f8f9fa; }

        .card-row { display: flex; margin-bottom: 8px; font-size: 14px; }

        .card-row b { width: 65px; color: #888; font-weight: 600; flex-shrink: 0; }

        .card-row span { color: #333; font-weight: 600; }

        .card-btns { display: flex; gap: 10px; margin-top: 20px; }

        .card-btns a { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; cursor: pointer; transition: all 0.2s; }

        .btn-tel { background: #f8f9fa; color: #4a5568; border: 1px solid #e2e8f0; }

        .btn-map { background: #fff5f5; color: #e53e3e; border: 1px solid #feb2b2; }

       @media (max-width: 768px) { 

    #app-container { 

        flex-direction: column; 

    } 

    

    /* 1. 지도 영역: 상단 50% */

    #map { 

        height: 35% !important; 

        flex: none; 

        order: -1; 

    } 

    

    /* 2. 사이드바 영역: 모바일에서 width를 100%로 재정의 */

    #sidebar { 

        width: 100% !important;   /* 고정 450px을 100%로 덮어씀 */

        min-width: 100% !important; 

        height: 65% !important; 

        min-height: 60% !important; 

        border-right: none; 

        border-top: 2px solid #e1e4e8; 

        order: 1; 

        box-sizing: border-box; /* 패딩 포함 */

    }.info-card {

        width: 196px !important;  /* 280px의 약 70% */

        padding: 15px !important; /* 22px의 약 70% */

        border-radius: 14px !important;

    }

    .card-title {

        font-size: 13px !important;

        margin-bottom: 10px !important;

        padding-bottom: 8px !important;

    }

    .card-row {

        font-size: 10px !important; /* 글자 크기 축소 */

    }

    .card-row b {

        width: 45px !important; /* b 태그 너비 조정 */

    }

    .card-btns {

        margin-top: 12px !important;

        gap: 6px !important;

    }

    .card-btns a {

        padding: 8px !important;

        font-size: 10px !important;

    }
           .region-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 15px 0;
}

/* 개별 버튼 디자인 */
.region-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 15px 0;
}

.region-btn {
    padding: 10px 5px;
    background: #ffffff;
    border: 1px solid #dcdde1;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #57606f;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* 마우스 올렸을 때 */
.region-btn:hover {
    border-color: #0070c0;
    color: #0070c0;
}

/* 핵심: 선택되었을 때 표시 - !important를 넣어 CSS 우선순위 강제 */
.region-btn.active {
    background-color: #0070c0 !important;
    color: #ffffff !important;
    border-color: #0070c0 !important;
    box-shadow: 0 4px 6px rgba(0, 112, 192, 0.2);
}
}

    </style>

</head>

<body>

    <div id="app-container">

      <div id="sidebar">
    <div id="scroll-area">
    <div id="progressBar" style="font-size:12px; font-weight:bold; margin-bottom:15px; color:#0070c0;">데이터 로딩 중...</div>
    
    <div class="btn-common" style="background-color: #ff4757;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>

    <div style="margin-top:20px;">
        <div style="font-weight:700; font-size:13px; color:#333; margin-bottom:5px;">담당 지역 선택</div>
        <div class="region-grid">
            <button class="region-btn" onclick="selectRegion(this, '경남')">경남</button>
            <button class="region-btn" onclick="selectRegion(this, '경북')">경북</button>
            <button class="region-btn" onclick="selectRegion(this, '전라')">전라</button>
            <button class="region-btn" onclick="selectRegion(this, '충청')">충청</button>
            <button class="region-btn" onclick="selectRegion(this, '강남')">강남</button>
            <button class="region-btn" onclick="selectRegion(this, '강북')">강북</button>
        </div>
    </div>
    
    <div style="font-weight:700; margin-top:20px;">사이트 검색 ▼</div>
    <input type="text" id="searchKeyword" style="width:100%; padding:14px; margin-top:5px; box-sizing:border-box; border:1px solid #e1e4e8; border-radius:12px;" placeholder="사이트/기번/코너명 입력...">
    <ul id="resultList" class="data-list"></ul>
</div>
    <div id="footer-area"><div>제작 : 경남팀</div><div>항상 안전운전 하세요</div><div style="margin-top: 5px; color: #bbb;">© 2026. All Rights Reserved.</div></div>
</div>

        <div id="map"></div>

    </div>



    <script>
       let map, geocoder, clusterer, infowindow, sheetData = [], myLocationMarker = null, currentMarker = null;
let currentRegion = '경남'; // 현재 선택된 지역을 저장할 변수 추가
        let contactList = {};

    kakao.maps.load(() => {
        map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
        geocoder = new kakao.maps.services.Geocoder();
        clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
        infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const myPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    map.setCenter(myPos);
                    map.setLevel(5);
                    if (myLocationMarker) myLocationMarker.setMap(null);
                    myLocationMarker = new kakao.maps.Marker({
                        map: map,
                        position: myPos,
                        image: new kakao.maps.MarkerImage('https://t1.daumcdn.net/mapjsapi/images/2x/marker.png', new kakao.maps.Size(30, 40), { offset: new kakao.maps.Point(15, 35) })
                    });
                },
                () => console.warn("현재 위치 사용 불가")
            );
        }
        
        kakao.maps.event.addListener(map, 'click', function() { infowindow.close(); });
        loadData();
    });

    async function loadData(regionName = '경남') {
    currentRegion = regionName;
    const progressBar = document.getElementById('progressBar');
    
    try {
        progressBar.innerText = `${regionName} 데이터 요청 중...`;
        const baseUrl = 'https://script.google.com/macros/s/AKfycbwdOgFOqr36Ts1mJv_nX7JnOpoFj1mGRlQN_S0vgzraPZw-TMTmZpaT0FnkY1MBUSX6vg/exec';
        const url = `${baseUrl}?sheetName=${encodeURIComponent(regionName)}`;
        
        const res = await fetch(url);
        if (!res.ok) throw new Error(`서버 응답 오류: ${res.status}`);
        
        const result = await res.json();
        
        // 데이터 구조 자동 감지
        if (result.sites && Array.isArray(result.sites)) {
            sheetData = result.sites;
            contactList = result.contacts || {};
        } else if (Array.isArray(result)) {
            // 예전처럼 배열만 올 경우 (앱스 스크립트 수정 안 된 경우)
            sheetData = result;
            contactList = {}; 
        } else {
            throw new Error("데이터 형식을 확인할 수 없습니다.");
        }
        
        progressBar.innerText = `${regionName} 로딩 완료!`;
        // 검색어 입력값이 없으면 빈 문자열 전달
        const keyword = document.getElementById('searchKeyword') ? document.getElementById('searchKeyword').value : '';
        triggerSearch(keyword);
        
    } catch (e) {
        console.error("데이터 로딩 에러:", e);
        progressBar.innerText = "로딩 실패: " + e.message;
    }
}
    async function selectRegion(btnElement, regionName) {
        document.querySelectorAll('.region-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        currentRegion = regionName;
        await loadData(regionName);
    }

    function findSiteByData(address) {
        const item = sheetData.find(i => i.address === address);
        if (!item) return;

        if (!item.address || item.address.trim() === '' || item.address === '-') {
            alert("등록된 주소 정보가 없습니다.");
            item.lat = null; item.lng = null;
            displayInfowindowAtCenter(item);
            return;
        }

        item.lat = null; item.lng = null;
        geocoder.addressSearch(item.address, (result, status) => {
            if (status === kakao.maps.services.Status.OK) {
                const lat = result[0].y;
                const lng = result[0].x;
                const coords = new kakao.maps.LatLng(lat, lng);
                map.setCenter(coords);
                map.setLevel(3);
                
                if (currentMarker) currentMarker.setMap(null);
                currentMarker = new kakao.maps.Marker({ map: map, position: coords });
                kakao.maps.event.addListener(currentMarker, 'click', () => displayInfowindow(currentMarker, item));
                
                item.lat = lat; item.lng = lng;
                displayInfowindow(currentMarker, item);
            } else {
                alert("정확한 위치를 찾을 수 없습니다.");
                displayInfowindowAtCenter(item);
            }
            document.getElementById('resultList').style.display = 'none';
            document.getElementById('searchKeyword').value = "";
        });
    }

 function displayInfowindow(marker, item) {
    const renderRow = (label, val) => (val && val !== '-' && val.toString().trim() !== '') ? `<div class="card-row"><b>${label}</b> <span>${val}</span></div>` : '';
    const hasAddress = item.address && item.address.trim() !== '' && item.address !== '-';
    const hasCoords = item.lat && item.lng; 
    const memoValue = item.memo || '';

    const content = `<div class="info-card">
        <div class="card-title">${item.site}</div>
        ${renderRow('주소', item.address)}${renderRow('기번', item.MN)}${renderRow('담당자', item.TSE)}${renderRow('경비사', item.sec)}${renderRow('연락처', item.phone)}${renderRow('기타', item.etc)}${renderRow('주차', item.park)}
        
        <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
            <textarea id="memoArea" style="width:100%; height:60px; font-size:12px; border:1px solid #cbd5e0; border-radius:8px; padding:8px; box-sizing:border-box; background:#f7fafc; resize:none; margin-bottom:5px;" placeholder="특이사항을 입력하세요...">${memoValue}</textarea>
            <button onclick="saveMemoAndAlert('${item.site.replace(/'/g, "\\'")}', '${item.TSE}')" 
                    style="width:100%; padding:10px; background:#4a5568; color:white; border:none; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:0.2s;">
                <span>💾</span> 메모 저장 및 알림
            </button>
        </div>

        <div class="card-btns">
            <a href="tel:${item.phone || '#'}" class="btn-tel">📞 경비사전화</a>
            ${(hasAddress && hasCoords) ? `<a onclick="requestTmap('${item.address.replace(/'/g, "\\'")}', '${item.lat}', '${item.lng}')" class="btn-map">📍 길찾기</a>` : `<a class="btn-map" style="background:#f0f0f0; border-color:#ddd; color:#aaa; cursor:default; pointer-events:none;">📍 불가</a>`}
        </div>
    </div>`;
    
    infowindow.setContent(content);
    infowindow.open(map, marker);
}

    function displayInfowindowAtCenter(item) {
        const center = map.getCenter();
        if (currentMarker) currentMarker.setMap(null);
        currentMarker = new kakao.maps.Marker({ map: map, position: center });
        kakao.maps.event.addListener(currentMarker, 'click', () => displayInfowindow(currentMarker, item));
        item.lat = null; item.lng = null;
        displayInfowindow(currentMarker, item);
    }

    function triggerSearch(val) {
    const list = document.getElementById('resultList');
    
    // 1. 데이터 로드 전 에러 방지 (방어 코드)
    if (!sheetData || !Array.isArray(sheetData)) {
        console.warn("데이터가 로드되지 않았습니다.");
        return;
    }

    val = val.toLowerCase();
    if (val.length < 1) { list.style.display = 'none'; return; }

    // 2. 필터링 로직
    const filtered = sheetData.filter(i => 
        String(i.site || '').toLowerCase().includes(val) || 
        String(i.MN || '').toLowerCase().includes(val) || 
        String(i.BIN2 || '').toLowerCase().includes(val)
    );

    // 3. 리스트 렌더링 (메모 아이콘 추가)
    list.innerHTML = filtered.map(i => {
        const safeAddress = (i.address && typeof i.address === 'string') ? i.address.replace(/'/g, "\\'") : '';
        
        // 메모가 있으면 📝 아이콘 표시 (메모가 빈 문자열이 아니고 값이 있을 때)
        const memoIcon = (i.memo && i.memo.toString().trim() !== '') ? '<span style="color:#d9534f; margin-left:5px;">📝</span>' : '';

        return `<li onclick="findSiteByData('${safeAddress}')" style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;">
                    <div style="font-weight:700; font-size:14px; display:flex; align-items:center;">
                        ${i.site || '이름 없음'} ${memoIcon}
                    </div>
                    <div style="font-size:12px; color:#555; margin-top:3px;">
                        기번: ${i.MN || '-'} | 코너명: ${i.BIN2 || '-'} | 담당자: ${i.TSE || '-'}
                    </div>
                </li>`;
    }).join('');

    list.style.display = filtered.length > 0 ? 'block' : 'none';
}
    document.getElementById('searchKeyword').addEventListener('input', function() { triggerSearch(this.value); });

    function requestTmap(address, lat, lng) {
        if (!lat || !lng) { alert("좌표 정보를 확인 중입니다."); return; }
        openMapRoute(address, lat, lng);
    }

    function openMapRoute(address, lat, lng) {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            const tmapUrl = `tmap://route?name=${encodeURIComponent(address)}&goalx=${parseFloat(lng).toFixed(6)}&goaly=${parseFloat(lat).toFixed(6)}`;
            window.location.href = tmapUrl;
            setTimeout(() => { if (document.visibilityState === 'visible') alert("TMAP 앱이 설치되어 있지 않거나 실행할 수 없습니다."); }, 1000);
        } else { alert("모바일 환경에서만 TMAP 길찾기 이용이 가능합니다."); }
    }
function saveMemoAndAlert(siteName, tseName) {
    console.log("찾으려는 담당자 이름:", tseName); // 이름이 어떻게 들어오는지 확인
    console.log("현재 연락처 리스트:", contactList); // 전체 리스트 확인
    const memo = document.getElementById('memoArea').value;
    const regionName = currentRegion;
    const phone = contactList[tseName.trim()]; // 공백 제거 후 다시 시도
    const url = 'https://script.google.com/macros/s/AKfycbwdOgFOqr36Ts1mJv_nX7JnOpoFj1mGRlQN_S0vgzraPZw-TMTmZpaT0FnkY1MBUSX6vg/exec';

    // 1. 먼저 구글 시트에 메모 저장 (POST 요청)
    fetch(`${url}?sheetName=${encodeURIComponent(regionName)}`, {
        method: 'POST',
        body: new URLSearchParams({ siteName: siteName, memo: memo })
    })
    .then(res => res.text())
    .then(data => {
        // 2. 저장 성공 후, 담당자 번호 확인 및 메시지 발송
        const phone = contactList[tseName] || null;
        
        if (phone) {
            const message = `[현장 메모 알림] ${siteName} 사이트에 메모가 추가되었습니다.\n내용: ${memo}`;
            // 문자 앱 실행
            window.location.href = `sms:${phone}?body=${encodeURIComponent(message)}`;
        } else {
            // 번호가 없을 때만 성공 알림 표시
            alert("메모가 저장되었습니다! (담당자 번호를 찾을 수 없어 알림은 발송되지 않았습니다.)");
        }
    })
    .catch(err => {
        console.error(err);
        alert("저장 실패: " + err.message);
    });
}
    function moveToMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const myPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                map.setCenter(myPos); 
                map.setLevel(3);
                if (myLocationMarker) myLocationMarker.setMap(null);
                myLocationMarker = new kakao.maps.Marker({
                    map: map, position: myPos,
                    image: new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png', new kakao.maps.Size(31, 35), { offset: new kakao.maps.Point(15, 35) })
                });
            }, () => alert("위치 정보를 가져올 수 없습니다."));
        } else { alert("위치 기능을 지원하지 않습니다."); }
    }
    </script>

</body>

</html>
