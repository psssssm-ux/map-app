<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:,">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100%; flex-direction: row; }
        
        /* 1. 사이드바 구조: flex-direction: column 필수 */
        #sidebar { 
            width: 400px; min-width: 400px; height: 100%; background: #ffffff; 
            border-right: 1px solid #e1e4e8; display: flex; flex-direction: column; 
            box-sizing: border-box; 
        }
        
        /* 2. 스크롤 영역: 나머지 공간을 다 차지함 */
        #scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* 3. 하단 고정 영역: 고정된 높이 */
        #footer-area { padding: 20px; border-top: 1px solid #eee; background: #fafafa; font-size: 12px; color: #888; text-align: center; }

        #map { flex: 1; height: 100%; position: relative; z-index: 1; }
        
        .btn-common { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; color: #fff; text-align: center; transition: background 0.2s; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; display: none; overflow-y: auto; max-height: 200px; }
        .data-list li { padding: 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px; }
        
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid #ddd; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="scroll-area">
                <div id="progressBar" style="font-size:12px; font-weight:bold; margin-bottom:10px; color:#0070c0;">데이터 로딩 중...</div>
                <div class="btn-common" style="background-color: #ff4757;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
                <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
                <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
                <ul id="recentList" class="data-list"></ul>
                <div style="font-weight:700; margin-top:10px;">사이트 검색 ▼</div>
                <input type="text" id="searchKeyword" style="width:100%; padding:14px; margin-top:5px; border:1px solid #e1e4e8; border-radius:12px;" placeholder="사이트명 입력...">
                <ul id="resultList" class="data-list"></ul>
            </div>
            
            <div id="footer-area">
                <div>제작자 : 경남팀 박상문 | 기획 : 경남팀 김민우</div>
                <div style="margin-top: 5px; color: #bbb;">© 2026. All Rights Reserved.</div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        // ... (기존 스크립트 코드와 동일)
        let map, geocoder, clusterer, infowindow, sheetData = [];
        let myLocationMarker = null;

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            loadData();
        });

        async function loadData() {
            try {
                const res = await fetch('https://script.google.com/macros/s/AKfycbwQNp3OGUMj9WN2h8A8wJoyoGKysrdRm1nFHzjeYqTpfPAhraX2hT803CBgN58Xr9B8gQ/exec');
                sheetData = await res.json();
                for (const item of sheetData) {
                    geocoder.addressSearch(item.address, (result, status) => {
                        if (status === kakao.maps.services.Status.OK) {
                            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                            clusterer.addMarker(marker);
                        }
                    });
                }
                document.getElementById('progressBar').innerText = "데이터 동기화 완료";
            } catch (e) { document.getElementById('progressBar').innerText = "데이터 로딩 실패"; }
        }

        function moveToMyLocation() {
            if (!navigator.geolocation) { alert("위치 정보를 지원하지 않습니다."); return; }
            navigator.geolocation.getCurrentPosition(position => {
                const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(locPosition);
                map.setLevel(3);
                if (myLocationMarker) myLocationMarker.setMap(null);
                myLocationMarker = new kakao.maps.Marker({
                    map: map,
                    position: locPosition,
                    image: new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png', new kakao.maps.Size(32, 35)),
                    zIndex: 999
                });
            }, () => { alert("위치 접근이 거부되었습니다."); });
        }

        document.getElementById('searchKeyword').addEventListener('input', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            const filtered = sheetData.filter(i => (i.site || '').toLowerCase().includes(val));
            if (val.length === 0) { list.style.display = 'none'; return; }
            list.innerHTML = filtered.map(i => `<li onclick="findSite(${sheetData.indexOf(i)})"><div style="font-weight:700;">${i.site}</div><div style="font-size:12px; color:#888;">코너: ${i.BIN2 || '-'} | 기번: ${i.MN || '-'}</div></li>`).join('');
            list.style.display = 'block';
        });

        function findSite(index) {
            const item = sheetData[index];
            geocoder.addressSearch(item.address, (res, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const coords = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(coords);
                    map.setLevel(3);
                    infowindow.close();
                    const marker = new kakao.maps.Marker({ map: map, position: coords });
                    infowindow.setContent(`<div style="padding:15px; border-radius:15px;"><b>${item.site}</b><br>기번: ${item.MN}<br>담당: ${item.TSE}</div>`);
                    infowindow.open(map, marker);
                    document.getElementById('resultList').style.display = 'none';
                }
            });
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            list.style.display = (list.style.display === 'block') ? 'none' : 'block';
            list.innerHTML = sheetData.slice(-5).map(i => `<li onclick="findSite(${sheetData.indexOf(i)}); document.getElementById('recentList').style.display='none'">${i.site}</li>`).join('');
        }
        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); }
    </script>
</body>
</html>
