<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; font-family: 'Pretendard', sans-serif; overflow: hidden; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100%; flex-direction: row; }
        
        #sidebar { width: 400px; min-width: 400px; height: 100%; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex: 1; height: 100%; position: relative; }

        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; min-width: 100%; height: 35%; border-bottom: 2px solid #ddd; }
            #map { height: 65%; width: 100%; }
        }

        .btn-common { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; color: #fff; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 결과 리스트를 전체 화면 오버레이로 처리 */
        #resultList { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .data-list { list-style: none; padding: 0; }
        .data-list li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="progressBar" style="font-size:12px; font-weight:bold; margin-bottom:10px;">데이터 동기화: 100%</div>
            <div class="btn-common" style="background-color: #ff9f43;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
            <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
            <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList" class="data-list" style="position: relative; display: none; background: #f9f9f9;"></ul>
            
            <div style="font-weight:700; margin-top:10px;">사이트 검색 ▼</div>
            <input type="text" id="searchKeyword" style="width:100%; padding:15px; margin-top:5px; box-sizing:border-box; border:1px solid #ccc; border-radius:8px; font-size:16px;" placeholder="사이트명 입력...">
        </div>
        <div id="map"></div>
    </div>
    
    <ul id="resultList" class="data-list">
        <li style="background:#eee; font-weight:bold;" onclick="document.getElementById('resultList').style.display='none'">닫기 X</li>
    </ul>

    <script>
        let map, geocoder, clusterer, sheetData = [];
        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadData();
        });
        async function loadData() {
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://script.google.com/macros/s/AKfycbzdpzbv7uXGZ4SqCh5YtSn_0Nfv6aY6iYHHZE1KJi8spiI7Ts_-u0-ZS3pN01RSQBYRQA/exec'));
            sheetData = await res.json();
        }
        
        document.getElementById('searchKeyword').addEventListener('input', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            if (!val) { list.style.display = 'none'; return; }
            const filtered = sheetData.filter(i => (i.site || '').toLowerCase().includes(val));
            
            if (filtered.length > 0) {
                list.innerHTML = `<li style="background:#eee; font-weight:bold;" onclick="document.getElementById('resultList').style.display='none'">닫기 X</li>` + 
                filtered.map(i => `
                    <li onclick="findSite('${i.site}')">
                        <strong>${i.site}</strong><br>
                        <span style="font-size:13px; color:#666;">코너: ${i.BIN2 || '-'} / 기번: ${i.MN || '-'}</span>
                    </li>`).join('');
                list.style.display = 'block';
            }
        });

        function findSite(name) {
            const item = sheetData.find(i => i.site === name);
            if(item) {
                geocoder.addressSearch(item.address, (res) => {
                    map.setCenter(new kakao.maps.LatLng(res[0].y, res[0].x));
                    map.setLevel(4);
                    document.getElementById('resultList').style.display = 'none';
                });
            }
        }
        function toggleRecent() {
            const list = document.getElementById('recentList');
            list.style.display = (list.style.display === 'block') ? 'none' : 'block';
            list.innerHTML = sheetData.slice(-5).map(i => `<li onclick="findSite('${i.site}'); document.getElementById('recentList').style.display='none'">${i.site}</li>`).join('');
        }
        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); }
        function moveToMyLocation() { navigator.geolocation.getCurrentPosition(p => map.setCenter(new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude))); }
    </script>
</body>
</html>
