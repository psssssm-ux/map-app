<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        #sidebar { width: 450px; min-width: 450px; height: 100vh; background: #ffffff; border-right: 1px solid #e1e4e8; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100vh; }
        .btn-common { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; text-align: center; color: white; display: block; }
        #progressBar { width: 0%; height: 6px; background: #0070c0; border-radius: 3px; transition: width 0.3s; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; background: #f8fafc; border: 1px solid #eee; border-radius: 12px; display: none; }
        .data-list li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .premium-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 280px; overflow: hidden; border: 1px solid #ccc; }
        .premium-header { background: #0070c0; padding: 15px; color: white; font-weight: 800; }
        .premium-body { padding: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div style="margin-bottom: 20px;">
                <div style="font-size:12px; font-weight:bold; margin-bottom:5px;">데이터 동기화: <span id="percentText">0%</span></div>
                <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px;"><div id="progressBar"></div></div>
            </div>
            <div class="btn-common" style="background-color: #ff9f43;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
            <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
            <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList" class="data-list"></ul>
            <input type="text" id="searchKeyword" placeholder="사이트명/코너명/기번 검색..." style="width:100%; padding:15px; margin-top:20px; box-sizing:border-box; border-radius:12px; border:1px solid #ccc;">
            <ul id="resultList" class="data-list"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        let loadedCount = 0;

        function initMap() {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        }
        kakao.maps.load(initMap);

        async function loadSheetData() {
            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbzdpzbv7uXGZ4SqCh5YtSn_0Nfv6aY6iYHHZE1KJi8spiI7Ts_-u0-ZS3pN01RSQBYRQA/exec');
                sheetData = await response.json();
                sheetData.forEach(item => {
                    const cached = localStorage.getItem(item.address);
                    if (cached) {
                        addMarker(JSON.parse(cached), item);
                        updateProgress();
                    } else {
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === 'OK') {
                                const pos = { lat: result[0].y, lng: result[0].x };
                                localStorage.setItem(item.address, JSON.stringify(pos));
                                addMarker(pos, item);
                            }
                            updateProgress();
                        });
                    }
                });
            } catch (e) { console.error("데이터 로드 실패:", e); }
        }

        function updateProgress() {
            loadedCount++;
            const percent = Math.round((loadedCount / sheetData.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').textContent = percent + '%';
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(pos.lat, pos.lng) });
            const infowindow = new kakao.maps.InfoWindow({ content: `<div style="padding:5px; font-size:12px;">${item.site}</div>` });

            kakao.maps.event.addListener(marker, 'mouseover', () => infowindow.open(map, marker));
            kakao.maps.event.addListener(marker, 'mouseout', () => infowindow.close());
            kakao.maps.event.addListener(marker, 'click', () => {
                if (customOverlay) customOverlay.setMap(null);
                customOverlay = new kakao.maps.CustomOverlay({
                    position: marker.getPosition(),
                    content: `<div class="premium-card"><div class="premium-header">${item.site}</div><div class="premium-body">주소: ${item.address}</div></div>`,
                    yAnchor: 1.2
                });
                customOverlay.setMap(map);
                map.panTo(marker.getPosition());
            });
            clusterer.addMarker(marker);
        }

        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); }
        function toggleRecent() { const list = document.getElementById('recentList'); list.style.display = list.style.display === 'block' ? 'none' : 'block'; }
        function moveToMyLocation() { if(navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude))); }
    </script>
</body>
</html>
