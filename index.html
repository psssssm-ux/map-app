<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:,">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100%; flex-direction: row; }
        #sidebar { width: 400px; min-width: 400px; height: 100%; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex: 1; height: 100%; position: relative; z-index: 1; }
        .btn-common { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; color: #fff; text-align: center; transition: background 0.2s; }
        .btn-common:hover { opacity: 0.9; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; display: none; overflow-y: auto; max-height: 250px; }
        .data-list li { padding: 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px; }
        
        .info-card { width: 280px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.05); }
        .card-title { font-size: 17px; font-weight: 800; color: #1a1a1a; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .card-row { display: flex; margin-bottom: 8px; font-size: 13.5px; }
        .card-row b { width: 65px; color: #888; font-weight: 500; flex-shrink: 0; }
        .card-row span { color: #333; font-weight: 600; }
        .card-btns { display: flex; gap: 10px; margin-top: 20px; }
        .card-btns a { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; transition: 0.2s; }
        .btn-tel { background: #f0f7ff; color: #0070c0; border: 1px solid #d1e7ff; }
        .btn-map { background: #fff9e6; color: #d9480f; border: 1px solid #ffe8a1; }
        
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 35%; border-right: none; border-bottom: 2px solid #ddd; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="progressBar" style="font-size:12px; font-weight:bold; margin-bottom:10px; color:#0070c0;">데이터 로딩 중...</div>
            <div class="btn-common" style="background-color: #ff4757;" onclick="moveToMyLocation()">📍 현재 위치로 이동 (빨간 마커)</div>
            <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
            <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList" class="data-list"></ul>
            <div style="font-weight:700; margin-top:10px;">사이트 검색 ▼</div>
            <input type="text" id="searchKeyword" style="width:100%; padding:14px; margin-top:5px; box-sizing:border-box; border:1px solid #e1e4e8; border-radius:12px;" placeholder="사이트명 입력...">
            <ul id="resultList" class="data-list"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script>
        let map, geocoder, clusterer, infowindow, sheetData = [];
        let myLocationMarker = null; // 현재 위치 마커 변수

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            loadData();
        });

        async function loadData() {
            try {
                const res = await fetch('https://script.google.com/macros/s/AKfycbwQNp3OGUMj9WN2h8A8wJoyoGKysrdRm1nFHzjeYqTpfPAhraX2hT803CBgN58Xr9B8gQ/exec');
                sheetData = await res.json();
                for (const item of sheetData) {
                    geocoder.addressSearch(item.address, (result, status) => {
                        if (status === kakao.maps.services.Status.OK) {
                            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                            clusterer.addMarker(marker);
                        }
                    });
                }
                document.getElementById('progressBar').innerText = "데이터 동기화 완료";
            } catch (e) { document.getElementById('progressBar').innerText = "데이터 로딩 실패"; }
        }

        function moveToMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);

                    map.setCenter(locPosition);
                    map.setLevel(3);

                    // 기존 마커 제거
                    if (myLocationMarker) myLocationMarker.setMap(null);

                    // 빨간색 마커 생성
                    myLocationMarker = new kakao.maps.Marker({
                        map: map,
                        position: locPosition,
                        image: new kakao.maps.MarkerImage(
                            'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
                            new kakao.maps.Size(64, 69), 
                            {offset: new kakao.maps.Point(27, 69)}
                        )
                    });
                });
            }
        }

        document.getElementById('searchKeyword').addEventListener('input', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            const filtered = sheetData.filter(i => (i.site || '').toLowerCase().includes(val));
            
            if (val.length === 0) { list.style.display = 'none'; return; }
            list.innerHTML = filtered.map(i => `
                <li onclick="findSite(${sheetData.indexOf(i)})">
                    <div style="font-weight:700;">${i.site}</div>
                    <div style="font-size:12px; color:#888;">코너: ${i.BIN2 || '-'} | 기번: ${i.MN || '-'}</div>
                </li>`).join('');
            list.style.display = 'block';
        });

        function findSite(index) {
            const item = sheetData[index];
            geocoder.addressSearch(item.address, (res, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const coords = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(coords);
                    map.setLevel(3);
                    infowindow.close();
                    const marker = new kakao.maps.Marker({ map: map, position: coords });
                    
                    const infoContent = `
                        <div class="info-card">
                            <div class="card-title">${item.site}</div>
                            <div class="card-row"><b>기번</b> <span>${item.MN || '-'}</span></div>
                            <div class="card-row"><b>담당자</b> <span>${item.TSE || '-'}</span></div>
                            <div class="card-row"><b>경비사</b> <span>${item.sec || '-'}</span></div>
                            <div class="card-row"><b>연락처</b> <span>${item.phone || '-'}</span></div>
                            <div class="card-row"><b>기타</b> <span>${item.etc || '-'}</span></div>
                            <div class="card-row"><b>주차</b> <span>${item.park || '-'}</span></div>
                            <div class="card-btns">
                                <a href="tel:${item.phone}" class="btn-tel">📞 전화</a>
                                <a href="https://map.kakao.com/link/to/${item.site},${res[0].y},${res[0].x}" target="_blank" class="btn-map">📍 길찾기</a>
                            </div>
                        </div>`;
                    
                    infowindow.setContent(infoContent);
                    infowindow.open(map, marker);
                    document.getElementById('resultList').style.display = 'none';
                }
            });
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            list.style.display = (list.style.display === 'block') ? 'none' : 'block';
            list.innerHTML = sheetData.slice(-5).map(i => `<li onclick="findSite(${sheetData.indexOf(i)}); document.getElementById('recentList').style.display='none'">${i.site}</li>`).join('');
        }
        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); }
    </script>
</body>
</html>
