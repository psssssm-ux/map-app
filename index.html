<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        /* ... (기존 스타일 동일) ... */
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="menu-area">
            <button class="menu-btn" onclick="location.reload()">지도 초기화</button>
            <button class="menu-btn" onclick="showRecentUpdates()">최근 수정된 사이트</button>
        </div>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색..." onkeyup="showResults()">
        <h3 id="listTitle"></h3>
        <ul id="resultList"></ul>
        <div class="footer-area">...</div>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer, searchMarker, customOverlay;
        let sheetData = [];
        const apiUrl = "https://script.google.com/macros/s/AKfycbwpmd9E34rOwxJBVbJBOBkcTWG92G6DWWCJk0X_AAPuHNKVSrbK_Lmbsg8_SsHPitbr0g/exec";

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            searchMarker = new kakao.maps.Marker();
            fetchSheetData();
        });

        async function fetchSheetData() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("HTTP 오류");
                sheetData = await response.json();
                
                clusterer.clear();
                sheetData.forEach(item => {
                    if(item.address) {
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === kakao.maps.services.Status.OK) {
                                var marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                                
                                // [클릭] 시 오버레이 (기존 기능)
                                kakao.maps.event.addListener(marker, 'click', () => showOverlay(marker, item));
                                
                                // [추가] 마우스 올렸을 때도 나오게 하려면 아래 주석을 해제하세요
                                // kakao.maps.event.addListener(marker, 'mouseover', () => showOverlay(marker, item));
                                
                                clusterer.addMarker(marker);
                            }
                        });
                    }
                });
            } catch(e) { console.error("데이터 로드 실패:", e); }
        }

        // 검색 기능 복구 및 보강
        function showResults() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            document.getElementById('listTitle').textContent = keyword ? '검색 결과' : '';
            
            if (keyword.length < 1) return;

            const filtered = sheetData.filter(item => item.site && item.site.includes(keyword));
            filtered.forEach(item => {
                let li = document.createElement('li');
                li.textContent = item.site;
                li.onclick = () => selectItem(item);
                list.appendChild(li);
            });
        }

        // 오버레이 표시 함수
        function showOverlay(targetMarker, item) {
            if (customOverlay) customOverlay.setMap(null);
            
            const content = document.createElement('div');
            content.className = 'custom-overlay';
            content.innerHTML = `
                <div class="overlay-header">${item.site || '정보 없음'}</div>
                <div class="overlay-body">
                    <b>코너명:</b> ${item.BIN2 || '-'}<br>
                    <b>경비사:</b> ${item.sec || '-'}<br>
                    <b>전화:</b> ${item.phone || '-'}<br>
                    <b>기타:</b> ${item.etc || '-'}<br>
                    <b>주차:</b> ${item.park || '-'}<br>
                    <b>주소:</b> ${item.address || '-'}
                </div>`;
            
            customOverlay = new kakao.maps.CustomOverlay({ 
                position: targetMarker.getPosition(), 
                content: content, 
                yAnchor: 1.2 
            });
            customOverlay.setMap(map);
        }

        // 기타 selectItem, showRecentUpdates 함수는 이전과 동일
        function selectItem(item) {
            geocoder.addressSearch(item.address, (res, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    var coords = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(coords);
                    map.setLevel(3);
                    showOverlay({getPosition: () => coords}, item);
                }
            });
        }
    </script>
</body>
</html>
