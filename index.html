<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #sidebar { width: 320px; height: 100%; background: #ffffff; border-right: 1px solid #eaeaea; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10; display: flex; flex-direction: column; }
        .menu-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .menu-btn { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; color: #555; transition: 0.2s; }
        .menu-btn:hover { background: #764ba2; color: #fff; border-color: #764ba2; }
        #searchKeyword { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; }
        #listTitle { font-size: 16px; color: #764ba2; margin-top: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        #resultList { list-style: none; padding: 0; margin: 0; }
        #resultList li { padding: 12px 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; }
        #resultList li:hover { background-color: #f4f7ff; color: #764ba2; }
        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        .custom-overlay { position: absolute; bottom: 40px; left: -130px; border-radius: 16px; background: #ffffff; box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: 260px; border: none; pointer-events: none; }
        .overlay-header { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; padding: 12px 20px; font-weight: 700; font-size: 15px; border-radius: 16px 16px 0 0; }
        .overlay-body { padding: 15px 20px; font-size: 13px; color: #444; border-radius: 0 0 16px 16px; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="menu-area">
            <button class="menu-btn" onclick="location.reload()">지도 초기화</button>
            <button class="menu-btn" onclick="showRecentUpdates()">최근 수정된 사이트</button>
        </div>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색..." onkeyup="showResults()">
        <h3 id="listTitle"></h3>
        <ul id="resultList"></ul>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer, customOverlay;
        let sheetData = [];
        const apiUrl = "https://script.google.com/macros/s/AKfycbwpmd9E34rOwxJBVbJBOBkcTWG92G6DWWCJk0X_AAPuHNKVSrbK_Lmbsg8_SsHPitbr0g/exec";

        kakao.maps.load(() => {
            const container = document.getElementById('map');
            // 지도 컨테이너가 존재할 때만 초기화 수행
            if (container) {
                map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
                geocoder = new kakao.maps.services.Geocoder();
                clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
                fetchSheetData();
            }
        });

        async function fetchSheetData() {
            try {
                const response = await fetch(apiUrl);
                let data = await response.json();
                sheetData = data.sort((a, b) => new Date(b.date) - new Date(a.date));

                const promises = sheetData.map(item => {
                    return new Promise((resolve) => {
                        if (!item.address) return resolve(null);
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === kakao.maps.services.Status.OK) {
                                const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                                kakao.maps.event.addListener(marker, 'mouseover', () => showOverlay(marker, item));
                                kakao.maps.event.addListener(marker, 'mouseout', () => { if(customOverlay) customOverlay.setMap(null); });
                                resolve(marker);
                            } else { resolve(null); }
                        });
                    });
                });

                const results = await Promise.all(promises);
                clusterer.addMarkers(results.filter(m => m !== null));
            } catch(e) { console.error("데이터 로드 실패:", e); }
        }

        function showRecentUpdates() {
            const list = document.getElementById('resultList');
            const title = document.getElementById('listTitle');
            list.innerHTML = '';
            title.textContent = '최근 수정된 사이트';
            sheetData.slice(0, 7).forEach(item => {
                let li = document.createElement('li');
                li.textContent = item.site;
                li.onclick = () => selectItem(item);
                list.appendChild(li);
            });
        }

        function showResults() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            document.getElementById('listTitle').textContent = keyword ? '검색 결과' : '';
            if (keyword.length < 1) return;
            sheetData.filter(item => item.site && String(item.site).includes(keyword)).forEach(item => {
                let li = document.createElement('li');
                li.textContent = item.site;
                li.onclick = () => selectItem(item);
                list.appendChild(li);
            });
        }

        function selectItem(item) {
            geocoder.addressSearch(item.address, (res, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    var coords = new kakao.maps.LatLng(res[0].y, res[0].x);
                    map.setCenter(coords);
                    map.setLevel(3);
                    showOverlay({getPosition: () => coords}, item);
                }
            });
        }

        function showOverlay(target, item) {
            if (customOverlay) customOverlay.setMap(null);
            const content = document.createElement('div');
            content.className = 'custom-overlay';
            content.innerHTML = `
                <div class="overlay-header">${item.site || '정보 없음'}</div>
                <div class="overlay-body">
                    <b>코너명:</b> ${item.BIN2 || '-'}<br>
                    <b>경비사:</b> ${item.sec || '-'}<br>
                    <b>전화:</b> ${item.phone || '-'}<br>
                    <b>주소:</b> ${item.address || '-'}
                </div>`;
            const pos = target.getPosition ? target.getPosition() : target;
            customOverlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1.2 });
            customOverlay.setMap(map);
        }
    </script>
</body>
</html>
