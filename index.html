<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:,">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100%; flex-direction: row; }
        #sidebar { width: 450px; min-width: 450px; height: 100%; background: #ffffff; border-right: 1px solid #e1e4e8; display: flex; flex-direction: column; box-sizing: border-box; overflow-x: hidden; }
        #scroll-area { flex: 1; overflow-y: auto; padding: 20px; width: 100%; box-sizing: border-box; }
        #footer-area { padding: 20px; border-top: 1px solid #eee; background: #fafafa; font-size: 12px; color: #888; text-align: center; line-height: 1.6; }
        #map { flex: 1; height: 100%; position: relative; z-index: 1; }
        .btn-common { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 8px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; color: #fff; text-align: center; }
        #searchKeyword { width: 100% !important; box-sizing: border-box !important; padding: 14px; margin-top: 5px; border: 1px solid #e1e4e8; border-radius: 12px; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; display: none; overflow-y: auto; max-height: 300px; }
        .data-list li { padding: 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px; }
        .info-card { width: 280px; background: #ffffff; border-radius: 20px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #f0f0f0; }
        .card-title { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f8f9fa; }
        .card-row { display: flex; margin-bottom: 8px; font-size: 14px; }
        .card-row b { width: 65px; color: #888; font-weight: 600; flex-shrink: 0; }
        .card-row span { color: #333; font-weight: 600; }
        .card-btns { display: flex; gap: 10px; margin-top: 20px; }
        .card-btns a { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 700; text-decoration: none; cursor: pointer; transition: all 0.2s; }
        .btn-tel { background: #f8f9fa; color: #4a5568; border: 1px solid #e2e8f0; }
        .btn-map { background: #fff5f5; color: #e53e3e; border: 1px solid #feb2b2; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="scroll-area">
                <div id="progressBar" style="font-size:12px; font-weight:bold; margin-bottom:10px; color:#0070c0;">데이터 로딩 중...</div>
                <div class="btn-common" style="background-color: #ff4757;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
                <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
                <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
                <ul id="recentList" class="data-list"></ul>
                <div style="font-weight:700; margin-top:10px;">사이트 검색 ▼</div>
                <input type="text" id="searchKeyword" placeholder="사이트/기번/코너명 입력...">
                <ul id="resultList" class="data-list"></ul>
            </div>
            <div id="footer-area"><div>제작자 : 경남팀 박상문 | 기획 : 경남팀 김민우</div><div style="margin-top: 5px; color: #bbb;">© 2026. All Rights Reserved.</div></div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        let map, geocoder, clusterer, infowindow, sheetData = [], myLocationMarker = null;

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            loadData();
        });

        async function loadData() {
            try {
                const res = await fetch('https://script.google.com/macros/s/AKfycbwQNp3OGUMj9WN2h8A8wJoyoGKysrdRm1nFHzjeYqTpfPAhraX2hT803CBgN58Xr9B8gQ/exec');
                const data = await res.json();
                sheetData = data.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                
                for (let i = 0; i < sheetData.length; i++) {
                    await new Promise(resolve => setTimeout(resolve, 250));
                    const item = sheetData[i];
                    if (!item.address) continue;

                    geocoder.addressSearch(item.address, (result, status) => {
                        if (status === kakao.maps.services.Status.OK) {
                            item.lat = result[0].y;
                            item.lng = result[0].x;
                            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(item.lat, item.lng) });
                            kakao.maps.event.addListener(marker, 'mouseover', () => displayInfowindow(marker, item));
                            clusterer.addMarker(marker);
                        }
                    });
                    document.getElementById('progressBar').innerText = `데이터 처리 중: ${i + 1} / ${sheetData.length}`;
                }
                document.getElementById('progressBar').innerText = "모든 데이터 로딩 완료!";
            } catch (e) { document.getElementById('progressBar').innerText = "데이터 로딩 실패"; }
        }

        function displayInfowindow(marker, item) {
            const renderRow = (label, val) => (val && val !== '-' && val.toString().trim() !== '') ? `<div class="card-row"><b>${label}</b> <span>${val}</span></div>` : '';
            const content = `<div class="info-card" onmouseleave="infowindow.close()">
                <div class="card-title">${item.site}</div>
                ${renderRow('주소', item.address)}${renderRow('기번', item.MN)}${renderRow('담당자', item.TSE)}${renderRow('경비사', item.sec)}${renderRow('연락처', item.phone)}${renderRow('기타', item.etc)}${renderRow('주차', item.park)}
                <div class="card-btns">
                    <a href="tel:${item.phone || '#'}" class="btn-tel">📞 전화</a>
                    <a onclick="openMapRoute('${item.address.replace(/'/g, "\\'")}', '${item.lat}', '${item.lng}')" class="btn-map">📍 길찾기</a>
                </div>
            </div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }

        document.getElementById('searchKeyword').addEventListener('input', function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('resultList');
            if (val.length < 1) { list.style.display = 'none'; return; }
            const filtered = sheetData.filter(i => String(i.site || '').toLowerCase().includes(val) || String(i.MN || '').toLowerCase().includes(val));
            list.innerHTML = filtered.map(i => `<li onclick="findSiteByData('${i.address.replace(/'/g, "\\'")}')">
                <div style="font-weight:700;">${i.site}</div><div style="font-size:12px;">기번: ${i.MN || '-'}</div></li>`).join('');
            list.style.display = filtered.length > 0 ? 'block' : 'none';
        });

        function findSiteByData(address) {
            const item = sheetData.find(i => i.address === address);
            if (!item || !item.lat) return;
            map.setCenter(new kakao.maps.LatLng(item.lat, item.lng));
            map.setLevel(3);
            document.getElementById('resultList').style.display = 'none';
            document.getElementById('searchKeyword').value = "";
        }

        function findSite(index) {
            const item = sheetData[index];
            if (!item || !item.lat) return;
            map.setCenter(new kakao.maps.LatLng(item.lat, item.lng));
            map.setLevel(3);
            document.getElementById('recentList').style.display = 'none';
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            if(list.style.display === 'block') { list.style.display = 'none'; return; }
            list.innerHTML = sheetData.slice(0, 5).map(i => `<li onclick="findSite(${sheetData.indexOf(i)})"><div style="font-weight:700;">${i.site}</div></li>`).join('');
            list.style.display = 'block';
        }

        function openMapRoute(address, lat, lng) {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const encodedAddress = encodeURIComponent(address);
            if (isMobile) {
                window.location.href = `kakaomap://route?ep=${lat},${lng}&by=CAR`;
                setTimeout(() => { window.location.href = `https://map.kakao.com/?eName=${encodedAddress}`; }, 1000);
            } else {
                window.open(`https://map.kakao.com/?eName=${encodedAddress}`, '_blank');
            }
        }
        
        function moveToMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const myPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    map.setCenter(myPos); map.setLevel(3);
                });
            }
        }

        function resetMap() { map.setCenter(new kakao.maps.LatLng(35.1517, 129.0305)); map.setLevel(7); }
    </script>
</body>
</html>
