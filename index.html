<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #app-container { display: flex; width: 100vw; height: 100vh; }
        #sidebar { width: 450px; min-width: 450px; height: 100vh; background: #fff; border-right: 1px solid #ddd; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #map { flex-grow: 1; height: 100vh; position: relative; }
        .btn-common { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; text-align: center; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; display: none; background: #f8fafc; border: 1px solid #eee; border-radius: 12px; }
        .data-list li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        #progressBar { width: 0%; height: 6px; background: #0070c0; border-radius: 3px; transition: width 0.3s; }
        .premium-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 280px; overflow: hidden; }
        .premium-header { background: #0070c0; padding: 15px; color: white; font-weight: bold; }
        .premium-body { padding: 15px; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="progressBarWrapper">
                <div style="font-size:12px; font-weight:bold; margin-bottom:5px;">데이터 동기화: <span id="percentText">0%</span></div>
                <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px;"><div id="progressBar"></div></div>
            </div>
            <div class="btn-common" style="background:#ff9f43; color:#fff;" onclick="moveToMyLocation()">📍 현재 위치 이동</div>
            <div class="btn-common" style="background:#0070c0; color:#fff;" onclick="toggleRecent()">최근 수정 사이트 보기 ▼</div>
            <ul id="recentList" class="data-list"></ul>
            <input type="text" id="searchKeyword" placeholder="검색..." style="width:100%; padding:10px; margin-top:20px; box-sizing:border-box;">
            <ul id="resultList" class="data-list"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script>
        let map, geocoder, clusterer, customOverlay, sheetData = [];
        let loadedCount = 0;

        function initMap() {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            loadSheetData();
        }
        kakao.maps.load(initMap);

        async function loadSheetData() {
            try {
                const res = await fetch('https://script.google.com/macros/s/AKfycbzdpzbv7uXGZ4SqCh5YtSn_0Nfv6aY6iYHHZE1KJi8spiI7Ts_-u0-ZS3pN01RSQBYRQA/exec');
                sheetData = await res.json();
                sheetData.forEach(item => {
                    const cached = localStorage.getItem(item.address);
                    if (cached) {
                        addMarker(JSON.parse(cached), item);
                        updateProgress();
                    } else {
                        geocoder.addressSearch(item.address, (result, status) => {
                            if (status === 'OK') {
                                const pos = { lat: result[0].y, lng: result[0].x };
                                localStorage.setItem(item.address, JSON.stringify(pos));
                                addMarker(pos, item);
                            }
                            updateProgress();
                        });
                    }
                });
            } catch (e) { console.error(e); }
        }

        function updateProgress() {
            loadedCount++;
            const percent = Math.round((loadedCount / sheetData.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').textContent = percent + '%';
        }

        function addMarker(pos, item) {
            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(pos.lat, pos.lng) });
            const infowindow = new kakao.maps.InfoWindow({ content: `<div style="padding:5px;">${item.site}</div>` });

            kakao.maps.event.addListener(marker, 'mouseover', () => infowindow.open(map, marker));
            kakao.maps.event.addListener(marker, 'mouseout', () => infowindow.close());
            kakao.maps.event.addListener(marker, 'click', () => {
                if (customOverlay) customOverlay.setMap(null);
                customOverlay = new kakao.maps.CustomOverlay({
                    position: marker.getPosition(),
                    content: `<div class="premium-card"><div class="premium-header">${item.site}</div><div class="premium-body">${item.address || ''}</div></div>`,
                    yAnchor: 1.2
                });
                customOverlay.setMap(map);
            });
            clusterer.addMarker(marker);
        }

        function toggleRecent() {
            const list = document.getElementById('recentList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }
        function moveToMyLocation() { /* 기존 로직 유지 */ }
    </script>
</body>
</html>
