<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        /* 기본 레이아웃 고정 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; font-family: sans-serif; }
        #sidebar { width: 320px; min-width: 320px; height: 100%; background: #ffffff; border-right: 1px solid #eaeaea; padding: 25px; box-sizing: border-box; overflow-y: auto; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        
        /* 스타일 요소 강화 */
        #loadingMsg { color: #764ba2; font-weight: 700; font-size: 14px; margin-bottom: 15px; display: block; }
        h3 { font-size: 18px; color: #444; margin-bottom: 20px; border-bottom: 2px solid #764ba2; padding-bottom: 10px; }
        #searchKeyword { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="loadingWrapper">
            <span id="loadingMsg">지도를 불러오는 중...</span>
        </div>
        <h3>사이트 관리</h3>
        <input type="text" id="searchKeyword" placeholder="사이트명 검색...">
        <div style="margin-top:20px; font-size:13px;">전체 사이트: <b id="totalCount">0개</b></div>
    </div>
    <div id="map"></div>

    <script>
        let map, geocoder, clusterer;

        // 카카오 지도 API가 완전히 로드된 후 실행
        kakao.maps.load(() => {
            const container = document.getElementById('map');
            const options = { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 };
            map = new kakao.maps.Map(container, options);
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            
            // 지도와 클러스터러가 준비된 후 데이터 로드 시작
            loadSheetData();
        });

        async function loadSheetData() {
            const jsonUrl = 'https://script.google.com/macros/s/AKfycbwxAh4O39J93KVy87IjPu3h17BUZJ120BwkfkESVHuorO21GXpZcJT0qLxEdJwTDM-y8Q/exec';
            try {
                const res = await fetch(jsonUrl);
                const data = await res.json();
                document.getElementById('totalCount').textContent = data.length + '개';
                document.getElementById('loadingMsg').textContent = "마커 생성 중...";

                data.forEach((item, index) => {
                    if (!item.address) return;

                    const cacheKey = 'loc_' + item.address;
                    const cached = localStorage.getItem(cacheKey);

                    if (cached) {
                        createMarker(JSON.parse(cached));
                    } else {
                        // 너무 빠른 요청을 방지하기 위한 지연 처리
                        setTimeout(() => {
                            geocoder.addressSearch(item.address, (result, status) => {
                                if (status === kakao.maps.services.Status.OK) {
                                    const pos = { lat: result[0].y, lng: result[0].x };
                                    localStorage.setItem(cacheKey, JSON.stringify(pos));
                                    createMarker(pos);
                                }
                            });
                        }, index * 100); 
                    }
                });
                document.getElementById('loadingMsg').textContent = "로딩 완료!";
            } catch (e) {
                document.getElementById('loadingMsg').textContent = "데이터 오류 발생";
            }
        }

        function createMarker(pos) {
            const marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(pos.lat, pos.lng)
            });
            clusterer.addMarker(marker); // 준비된 clusterer에 안전하게 추가
        }
    </script>
</body>
</html>
