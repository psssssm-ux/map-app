<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="data:,">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100svh; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; background: #f4f7fa; }
        #app-container { display: flex; width: 100vw; height: 100%; flex-direction: row; }
        #sidebar { width: 400px; min-width: 400px; height: 100%; background: #ffffff; border-right: 1px solid #e1e4e8; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex: 1; height: 100%; position: relative; z-index: 1; }
        .btn-common { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; color: #fff; text-align: center; transition: background 0.2s; }
        .btn-common:hover { opacity: 0.9; }
        .data-list { list-style: none; padding: 0; margin: 10px 0; background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; display: none; overflow-y: auto; max-height: 250px; }
        .data-list li { padding: 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px; }
        .data-list li:hover { background: #f9fbff; }
        
        /* 고급스러운 인포윈도우 스타일 */
        .info-win { padding: 16px; width: 260px; font-size: 14px; line-height: 1.6; border-radius: 16px; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.15); border: 1px solid #eee; }
        .info-win-title { font-size: 16px; font-weight: 800; color: #1a1a1a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .info-win-row { display: flex; margin-bottom: 4px; color: #444; }
        .info-win-row b { width: 60px; color: #888; font-weight: 500; font-size: 12px; flex-shrink: 0; }
        .info-win-btns { margin-top: 15px; display: flex; gap: 8px; }
        .info-win-btns a { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; }
        .btn-tel { background: #eef6ff; color: #0070c0; }
        .btn-map { background: #fff4e6; color: #f59f00; }
        
        #resultPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 35%; border-right: none; border-bottom: 2px solid #ddd; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="sidebar">
            <div id="progressBar" style="font-size:12px; font-weight:bold; margin-bottom:10px; color:#0070c0;">데이터 로딩 중...</div>
            <div class="btn-common" style="background-color: #ff9f43;" onclick="moveToMyLocation()">📍 현재 위치로 이동</div>
            <div class="btn-common" style="background-color: #667eea;" onclick="resetMap()">지도 위치 초기화 🔄</div>
            <div class="btn-common" style="background-color: #0070c0;" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList" class="data-list"></ul>
            <div style="font-weight:700; margin-top:10px;">사이트 검색 ▼</div>
            <input type="text" id="searchKeyword" style="width:100%; padding:14px; margin-top:5px; box-sizing:border-box; border:1px solid #e1e4e8; border-radius:12px;" placeholder="사이트명 검색...">
            <ul id="resultList" class="data-list"></ul>
        </div>
        <div id="map"></div>
    </div>
    
    <div id="resultPopup">
        <div style="padding:15px; background:#0070c0; color:white; font-weight:bold; text-align:center;" onclick="document.getElementById('resultPopup').style.display='none'">닫기 X</div>
        <div id="popupContent"></div>
    </div>

    <script>
        let map, geocoder, clusterer, infowindow, sheetData = [];

        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(35.1517, 129.0305), level: 7 });
            geocoder = new kakao.maps.services.Geocoder();
            clusterer = new kakao.maps.MarkerClusterer({ map: map, gridSize: 35, averageCenter: true, minLevel: 7 });
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            loadData();
        });

        async function loadData() {
            try {
                const res = await fetch('https://script.google.com/macros/s/AKfycbwQNp3OGUMj9WN2h8A8wJoyoGKysrdRm1nFHzjeYqTpfPAhraX2hT803CBgN58Xr9B8gQ/exec');
                sheetData = await res.json();
                for (const item of sheetData) {
                    geocoder.addressSearch(item.address, (result, status) => {
                        if (status === kakao.maps.services.Status.OK) {
                            const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(result[0].y, result[0].x) });
                            clusterer.addMarker(marker);
                        }
                    });
                }
