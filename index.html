<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>사이트 통합 지도 앱</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7f3387ab66fb524dbefeb77ae9f85e90&libraries=services,clusterer&autoload=false"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; overflow: hidden; font-family: sans-serif; }
        #sidebar { width: 320px; min-width: 320px; height: 100%; background: #ffffff; border-right: 1px solid #eaeaea; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        #sidebarContent { padding: 25px; flex-grow: 1; overflow-y: auto; }
        .section-gap { margin-top: 30px; }
        #map { flex-grow: 1; height: 100%; background-color: #f0f0f0; }
        
        #resetBtn { width: 100%; cursor: pointer; color: #fff; background-color: #667eea; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-align: center; border: none; }
        #resetBtn:hover { background-color: #5a67d8; }
        
        #recentMenu { cursor: pointer; color: #ffffff; background-color: #764ba2; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 8px; text-align: center; }
        #recentList { list-style: none; padding: 0; margin-top: 10px; display: none; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; }
        #recentList li { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
        
        #loadingWrapper { margin-bottom: 25px; }
        #progressContainer { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #progressBar { width: 0%; height: 100%; background: #764ba2; transition: width 0.2s; }
        
        h3 { font-size: 18px; color: #444; margin-bottom: 15px; border-bottom: 2px solid #764ba2; padding-bottom: 10px; }
        #searchKeyword { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        
        #footer { padding: 20px; text-align: center; border-top: 1px solid #f0f0f0; background: #fafafa; flex-shrink: 0; }
        .copyright { font-size: 11px; color: #bbb; margin-bottom: 8px; }
        .creator { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 4px; }
        .idea { font-size: 11px; color: #777; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebarContent">
            <div id="loadingWrapper">
                <div style="font-size:13px; font-weight:bold; color:#764ba2;">데이터 로딩 중... <span id="percentText">0%</span></div>
                <div id="progressContainer"><div id="progressBar"></div></div>
            </div>

            <div id="resetBtn" onclick="resetMap()">지도 위치 초기화 🔄</div>

            <div id="recentMenu" class="section-gap" onclick="toggleRecent()">최근 수정된 사이트 LIST ▼</div>
            <ul id="recentList"></ul>

            <div class="section-gap">
                <h3>사이트 관리</h3>
                <input type="text" id="searchKeyword" placeholder="사이트명/코너명/기번 검색..." onkeyup="filterList()">
                <ul id="resultList" style="list-style:none; padding:0; margin-top:10px; display:none; background:#fff; border:1px solid #eee; border-radius:12px;"></ul>
                <div style="margin-top:15px; font-size:13px;">전체 사이트: <b id="totalCount">0개</b></div>
            </div>
        </div>
        
        <div id="footer">
            <div class="copyright">© 2026. All rights reserved.</div>
            <div class="creator">Developed by 박상문</div>
            <div class="idea">Designed & Planned by 김민우</div>
        </div>
    </div>
    <div id="map"></div>
